function esc(s)     { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fillPrompt(t){ return t.replace(/\[MARKET\]/g,ctx.market||"[your audience]").replace(/\[FOCUS\]/g,ctx.focus||"[your focus]").replace(/\[IDENTITY\]/g,ctx.identity||"[your identity]"); }

// ── Unlock logic ───────────────────────────────────────────────
function isModuleUnlocked(modId) {
  if (modId === "m0") return true;
  const mods = MODULES.filter(m => m.ready);
  const idx  = mods.findIndex(m => m.id === modId);
  if (idx <= 0) return true;
  const prev = mods[idx - 1];
  // All required lessons in previous module must be done
  return (prev.lessons || []).filter(l => l.required).every(l => done[`${prev.id}_${l.id}`]);
}

function isLessonUnlocked(modId, lesId) {
  if (!isModuleUnlocked(modId)) return false;
  const mod = MODULES.find(m => m.id === modId);
  if (!mod) return false;
  const lessons = mod.lessons || [];
  const idx = lessons.findIndex(l => l.id === lesId);
  if (idx === 0) return true;
  // Previous lesson must be marked done
  return !!done[`${modId}_${lessons[idx - 1].id}`];
}

function allCoresDone(modId) {
  const mod = MODULES.find(m => m.id === modId);
  if (!mod) return false;
  return (mod.lessons || []).filter(l => l.required).every(l => done[`${modId}_${l.id}`]);
}

// ── Progress ───────────────────────────────────────────────────
function totalLessons() { return MODULES.filter(m=>m.ready).reduce((a,m)=>a+(m.lessons||[]).length,0); }
function totalDone()    { return Object.values(done).filter(Boolean).length; }

// ── Claude panel ───────────────────────────────────────────────
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById("claude-panel").classList.toggle("open", panelOpen);
  document.getElementById("content").style.marginRight = panelOpen ? "360px" : "0";
  const tb = document.getElementById("claude-toggle-btn");
  if (tb) tb.classList.toggle("active", panelOpen);
  if (panelOpen) updatePanelContext();
}

function updatePanelContext() {
  const mod = MODULES.find(m=>m.id===curMod);
  const les = (mod?.lessons||[]).find(l=>l.id===curLes);
  const el  = document.getElementById("cp-context-lesson");
  if (el) el.textContent = les ? `${mod.tag}: ${les.title}` : "—";
  renderChatMessages();
}

function renderChatMessages() {
  const container = document.getElementById("cp-messages");
  if (!container) return;
  container.innerHTML = "";
  const mod = MODULES.find(m=>m.id===curMod);
  const les = (mod?.lessons||[]).find(l=>l.id===curLes);

  const welcome = document.createElement("div"); welcome.className = "cp-welcome";
  welcome.innerHTML = `<div class="cp-welcome-title">👋 Hi ${esc(ctx?.name||"there")}!</div>
    <div class="cp-welcome-text">I've read your answers so far and I'm here to help you think through ${les?`<strong>${les.title}</strong>`:"this module"}. Ask me anything.</div>`;
  if (chatHistory.length === 0 && les?.suggestions?.length) {
    const sugg = document.createElement("div"); sugg.className = "cp-suggestions";
    les.suggestions.forEach(s => {
      const btn = document.createElement("button"); btn.className = "cp-suggestion"; btn.textContent = s;
      btn.addEventListener("click", () => sendMessageText(s));
      sugg.appendChild(btn);
    });
    welcome.appendChild(sugg);
  }
  container.appendChild(welcome);

  chatHistory.forEach(msg => {
    const wrap   = document.createElement("div"); wrap.className = `msg msg-${msg.role==="user"?"user":"claude"}`;
    const lbl    = document.createElement("div"); lbl.className = "msg-label"; lbl.textContent = msg.role==="user" ? (ctx?.name||"You") : "AI Coach";
    const bubble = document.createElement("div"); bubble.className = "msg-bubble"; bubble.textContent = msg.content;
    wrap.appendChild(lbl); wrap.appendChild(bubble); container.appendChild(wrap);
  });

  if (chatTyping) {
    const wrap   = document.createElement("div"); wrap.className = "msg msg-claude";
    const lbl    = document.createElement("div"); lbl.className = "msg-label"; lbl.textContent = "AI Coach";
    const typing = document.createElement("div"); typing.className = "cp-typing";
    typing.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(lbl); wrap.appendChild(typing); container.appendChild(wrap);
  }
  container.scrollTop = container.scrollHeight;
}

function buildSystemPrompt() {
  const mod = MODULES.find(m=>m.id===curMod);
  const les = (mod?.lessons||[]).find(l=>l.id===curLes);
  let filledAnswers = "";
  MODULES.filter(m=>m.ready).forEach(m => {
    (m.lessons||[]).forEach(l => {
      const lkey = `${m.id}_${l.id}`;
      const hasAns = l.tasks.some(t => answers[`${lkey}_${t.id}`]);
      if (!hasAns) return;
      filledAnswers += `\n\n--- ${m.tag}: ${l.title} ---\n`;
      l.tasks.forEach(t => {
        const v = answers[`${lkey}_${t.id}`];
        if (v && (typeof v==="string"?v.trim():v.length)) filledAnswers += `${t.label}\n${Array.isArray(v)?v.join(", "):v}\n\n`;
      });
    });
  });
  return `You are a warm, knowledgeable membership business coach embedded inside the TME+ (The Membership Experience Plus) sidekick tool, built on Stu McLaren's proven membership framework.

THE MEMBER YOU'RE COACHING:
Name: ${ctx?.name||"the member"}
Target market: ${ctx?.market||"not yet specified"}
Area of focus: ${ctx?.focus||"not yet specified"}
Identity: ${ctx?.identity||"not yet specified"}

CURRENTLY WORKING ON: ${mod?.tag||""}: ${les?.title||""}

THEIR ANSWERS SO FAR:${filledAnswers||"\n(Nothing filled in yet — they're just getting started)"}

YOUR ROLE:
- Be specific to THEIR membership idea, not generic
- Reference their actual answers when relevant  
- Keep responses concise — this is a sidebar coach, not a document
- Use TME framework language (Messaging Map™, Circle of Awesomeness™, Success Path™)
- Be encouraging but honest — push them to think deeper when needed
- Don't repeat back everything they said — get to the insight quickly`;
}

async function sendMessage() {
  const input = document.getElementById("cp-input");
  const text  = input?.value?.trim();
  if (!text || chatTyping) return;
  input.value = ""; input.style.height = "auto";
  sendMessageText(text);
}

async function sendMessageText(text) {
  chatHistory.push({role:"user", content:text});
  chatTyping = true; renderChatMessages();
  const msgs    = chatHistory.map(m=>({role:m.role,content:m.content}));
  const trimmed = msgs.length > 12 ? msgs.slice(-12) : msgs;
  try {
    const res  = await fetch("/api/claude", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,system:buildSystemPrompt(),messages:trimmed})});
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    chatHistory.push({role:"assistant", content:data.content?.map(b=>b.text||"").join("")||"Sorry, try again."});
  } catch(e) {
    chatHistory.push({role:"assistant", content:"Something went wrong — please try again in a moment."});
  }
  chatTyping = false; renderChatMessages();
}

document.addEventListener("DOMContentLoaded", () => {
  const inp = document.getElementById("cp-input");
  if (inp) {
    inp.addEventListener("input", () => { inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,100)+"px"; });
    inp.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} });
  }
});

// ── Render ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app"); app.innerHTML = "";
  if (!ctx) { app.appendChild(renderSetup()); return; }

  const pct = totalLessons() ? Math.round((totalDone()/totalLessons())*100) : 0;

  // Header
  const hdr = document.createElement("div"); hdr.id = "header";
  const toggleBtn = document.createElement("button");
  toggleBtn.className = "btn-claude-toggle" + (panelOpen?" active":"");
  toggleBtn.id = "claude-toggle-btn";
  toggleBtn.innerHTML = `<div class="claude-dot"></div><span>Ask AI</span>`;
  toggleBtn.addEventListener("click", togglePanel);
  hdr.innerHTML = `<div class="hlogo"><span style="font-size:22px">🚀</span>
    <div><div class="hlogo-title">TME+ Membership Sidekick</div><div class="hlogo-sub">Your companion through every module</div></div></div>
    <div class="hprog"><div class="hprog-inner">
      <div class="hprog-label">Overall Progress</div>
      <div class="hprog-val">${totalDone()} / ${totalLessons()} lessons</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div></div>`;
  const homeBtn = document.createElement("button");
  homeBtn.className = "btn-home" + (curView==="home"?" ah":"");
  homeBtn.innerHTML = `<span>🏠</span><span>Dashboard</span>`;
  homeBtn.addEventListener("click", () => { curView="home"; render(); });

  // Search
  const searchWrap = document.createElement("div"); searchWrap.className = "search-wrap";
  const searchBtn = document.createElement("button"); searchBtn.className = "btn-search";
  searchBtn.innerHTML = `<span>🔍</span><span>Search</span>`;
  const searchDrop = document.createElement("div"); searchDrop.className = "search-drop";
  const searchInput = document.createElement("input"); searchInput.className = "search-input";
  searchInput.placeholder = "Search lessons, tasks, your answers...";
  const searchResults = document.createElement("div"); searchResults.className = "search-results";
  searchDrop.appendChild(searchInput); searchDrop.appendChild(searchResults);
  searchWrap.appendChild(searchBtn); searchWrap.appendChild(searchDrop);

  searchBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const isOpen = searchDrop.classList.toggle("open");
    if (isOpen) { searchInput.value = ""; searchResults.innerHTML = ""; setTimeout(()=>searchInput.focus(), 50); }
  });

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    searchResults.innerHTML = "";
    if (q.length < 2) return;
    const results = [];

    MODULES.filter(m=>m.ready).forEach(mod => {
      (mod.lessons||[]).forEach(l => {
        const lkey = `${mod.id}_${l.id}`;
        let matches = [];

        // Search lesson title
        if (l.title.toLowerCase().includes(q)) matches.push({type:"title", text:l.title});

        // Search learn content
        (l.learn?.sections||[]).forEach(s => {
          if (s.h.toLowerCase().includes(q)) matches.push({type:"learn", text:s.h});
          s.items.forEach(item => { if (item.toLowerCase().includes(q)) matches.push({type:"learn", text:item}); });
        });

        // Search task labels
        l.tasks.forEach(t => {
          if (t.label.toLowerCase().includes(q)) matches.push({type:"task", text:t.label});
          // Search user answers
          const v = answers[`${lkey}_${t.id}`];
          if (v) {
            const str = Array.isArray(v) ? v.join(", ") : v;
            if (str.toLowerCase().includes(q)) matches.push({type:"answer", text:str});
          }
        });

        if (matches.length > 0) {
          results.push({mod, lesson:l, matches:matches.slice(0,2)});
        }
      });
    });

    if (results.length === 0) {
      searchResults.innerHTML = '<div class="search-empty">No results found</div>';
      return;
    }

    results.slice(0, 12).forEach(r => {
      const item = document.createElement("div"); item.className = "search-item";
      const dot = document.createElement("div"); dot.className = "si-dot"; dot.style.background = r.mod.color;
      const info = document.createElement("div");
      const tag = document.createElement("div"); tag.className = "si-tag"; tag.textContent = `${r.mod.tag} · ${r.lesson.tag}`;
      const title = document.createElement("div"); title.className = "si-title"; title.textContent = r.lesson.title;
      info.appendChild(tag); info.appendChild(title);

      r.matches.forEach(m => {
        const matchEl = document.createElement("div"); matchEl.className = "si-match";
        const prefix = m.type==="answer" ? "Your answer: " : "";
        let snippet = m.text.length > 80 ? m.text.slice(0, 80) + "…" : m.text;
        const idx = snippet.toLowerCase().indexOf(q);
        if (idx >= 0) {
          snippet = esc(snippet.slice(0, idx)) + "<mark>" + esc(snippet.slice(idx, idx+q.length)) + "</mark>" + esc(snippet.slice(idx+q.length));
        } else { snippet = esc(snippet); }
        matchEl.innerHTML = prefix + snippet;
        info.appendChild(matchEl);
      });

      item.appendChild(dot); item.appendChild(info);
      item.addEventListener("click", () => {
        searchDrop.classList.remove("open");
        closeMobSidebar();
        curView="lesson"; curMod=r.mod.id; curLes=r.lesson.id;
        curTab = r.matches[0]?.type==="learn" ? "learn" : "do";
        expanded[r.mod.id]=true; saveExp(); chatHistory=[]; render();
        if(panelOpen) updatePanelContext();
      });
      searchResults.appendChild(item);
    });
  });

  // Close search when clicking outside
  document.addEventListener("click", (e) => {
    if (!searchWrap.contains(e.target)) searchDrop.classList.remove("open");
  });

  const hbgBtn = document.createElement("button");
  hbgBtn.className = "btn-hbg";
  hbgBtn.innerHTML = "☰";
  hbgBtn.addEventListener("click", toggleMobSidebar);

  hdr.querySelector(".hlogo").insertAdjacentElement("beforebegin", hbgBtn);
  hdr.querySelector(".hprog").insertAdjacentElement("afterbegin", toggleBtn);
  hdr.querySelector(".hprog").insertAdjacentElement("afterbegin", searchWrap);
  hdr.querySelector(".hprog").insertAdjacentElement("afterbegin", homeBtn);
  app.appendChild(hdr);

  const body = document.createElement("div"); body.id = "body-row";

  const mobOverlay = document.createElement("div");
  mobOverlay.id = "mob-overlay";
  mobOverlay.className = "mob-ov";
  mobOverlay.addEventListener("click", closeMobSidebar);
  body.appendChild(mobOverlay);

  body.appendChild(renderSidebar());

  const content = document.createElement("div"); content.id = "content";
  content.style.marginRight = panelOpen ? "360px" : "0";

  if (curView === "home") {
    renderHome(content);
  } else {
    const mod = MODULES.find(m=>m.id===curMod);
    if (!mod || !mod.ready || !isModuleUnlocked(curMod)) {
      content.appendChild(renderComingSoon(mod));
    } else {
      const lesson = (mod.lessons||[]).find(l=>l.id===curLes);
      if (lesson) {
        if (!isLessonUnlocked(curMod, curLes)) renderLockedLesson(lesson, mod, content);
        else renderLesson(lesson, mod, content);
      }
    }
  }
  body.appendChild(content);
  app.appendChild(body);
  if (panelOpen) updatePanelContext();
}

// ── Sidebar ────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.createElement("div"); sb.id = "sidebar";
  MODULES.forEach(mod => {
    const group   = document.createElement("div"); group.className = "mod-group";
    const isExp   = !!expanded[mod.id];
    const modUnlocked = !mod.ready ? false : isModuleUnlocked(mod.id);
    const mhdr    = document.createElement("div");
    mhdr.className = "mod-header" + (curMod===mod.id?" active-mod":"") + (!modUnlocked?" locked-mod":"");

    let rightIcon = "";
    if (!mod.ready) rightIcon = `<span style="font-size:13px">🔒</span>`;
    else if (!modUnlocked) rightIcon = `<span style="font-size:13px">🔒</span>`;
    else rightIcon = `<span class="mod-chevron${isExp?" open":""}">›</span>`;

    mhdr.innerHTML = `<div class="mod-dot" style="background:${modUnlocked?mod.color:"#555"}"></div>
      <div class="mod-info"><div class="mod-tag">${mod.tag}</div><div class="mod-name${modUnlocked?"":" locked"}">${mod.name}</div></div>
      ${rightIcon}`;

    mhdr.addEventListener("click", () => {
      if (!mod.ready || !modUnlocked) return;
      expanded[mod.id] = !expanded[mod.id]; saveExp();
      if (expanded[mod.id] && mod.lessons?.length) { curView="lesson"; curMod=mod.id; curLes=mod.lessons[0].id; curTab="do"; }
      render();
    });
    group.appendChild(mhdr);

    if (mod.ready && mod.lessons && modUnlocked) {
      const list = document.createElement("div"); list.className = "lessons-list";
      list.style.maxHeight = isExp ? "600px" : "0";
      mod.lessons.forEach(l => {
        const lkey      = `${mod.id}_${l.id}`;
        const lUnlocked = isLessonUnlocked(mod.id, l.id);
        const isActive  = curView==="lesson" && curMod===mod.id && curLes===l.id;
        const isDone    = done[lkey];
        const btn       = document.createElement("button");
        btn.className   = "lesson-btn" + (isActive?" active":"") + (!lUnlocked?" lesson-locked":"");
        const icon      = !lUnlocked ? "🔒" : isDone ? "✅" : "○";
        btn.innerHTML   = `<span class="licon">${icon}</span><div><div class="ltag">${l.tag}</div><div class="ltitle">${l.title}</div>${!l.required?`<span class="optional-badge">optional</span>`:""}</div>`;
        if (lUnlocked) {
          btn.addEventListener("click", () => { closeMobSidebar(); curView="lesson"; curMod=mod.id; curLes=l.id; curTab="do"; expanded[mod.id]=true; saveExp(); chatHistory=[]; render(); if(panelOpen)updatePanelContext(); });
        }
        list.appendChild(btn);
      });
      group.appendChild(list);
    }
    sb.appendChild(group);
  });

  const footer = document.createElement("div"); footer.className = "sidebar-footer";
  footer.innerHTML = `<div class="sf-label">Your Context</div><div class="sf-name">${esc(ctx.name)} · ${esc(ctx.market.length>35?ctx.market.slice(0,35)+"…":ctx.market)}</div>`;
  const editBtn = document.createElement("button"); editBtn.className = "sf-edit"; editBtn.textContent = "Edit context";
  editBtn.addEventListener("click", () => { ctx=null; render(); });
  footer.appendChild(editBtn); sb.appendChild(footer);
  return sb;
}

// ── Coming soon / locked module ────────────────────────────────
function renderComingSoon(mod) {
  const modUnlocked = mod?.ready ? isModuleUnlocked(mod.id) : false;
  const wrap  = document.createElement("div"); wrap.style.cssText="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:60px 40px";
  const inner = document.createElement("div"); inner.style.maxWidth = "380px";

  if (mod?.ready && !modUnlocked) {
    // Built but locked — find which module they need to finish
    const mods = MODULES.filter(m=>m.ready);
    const idx  = mods.findIndex(m=>m.id===mod.id);
    const prev = idx > 0 ? mods[idx-1] : null;
    const remaining = prev ? (prev.lessons||[]).filter(l=>l.required&&!done[`${prev.id}_${l.id}`]).length : 0;
    inner.innerHTML = `<div style="font-size:48px;margin-bottom:16px">🔒</div>
      <div style="display:inline-block;background:#fff3e0;color:#F07830;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:14px">COMPLETE PREVIOUS MODULE</div>
      <div style="font-size:20px;font-weight:900;color:#1C2B1C;margin-bottom:8px">${mod.tag}: ${mod.name}</div>
      <div style="font-size:13.5px;color:#888;line-height:1.65">Finish the ${remaining} remaining core lesson${remaining!==1?"s":""} in ${prev?.tag||"the previous module"} to unlock this module.</div>`;
  } else {
    inner.innerHTML = `<div style="font-size:48px;margin-bottom:16px">🔒</div>
      <div style="display:inline-block;background:#f0f2f8;color:#888;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:14px">COMING SOON</div>
      <div style="font-size:20px;font-weight:900;color:#1C2B1C;margin-bottom:8px">${mod?mod.tag+": "+mod.name:"Module"}</div>
      <div style="font-size:13.5px;color:#888;line-height:1.65">This module's sidekick is being built. Your progress and context will carry forward automatically when it's ready.</div>`;
  }
  wrap.appendChild(inner); return wrap;
}

// ── Locked lesson ──────────────────────────────────────────────
function renderLockedLesson(lesson, mod, content) {
  const lessons = mod.lessons || [];
  const idx     = lessons.findIndex(l=>l.id===lesson.id);
  const prevLes = idx > 0 ? lessons[idx-1] : null;
  const wrap    = document.createElement("div"); wrap.style.cssText="display:flex;align-items:center;justify-content:center;height:80%;text-align:center;padding:60px 40px";
  const inner   = document.createElement("div"); inner.style.maxWidth = "360px";
  inner.innerHTML = `<div class="locked-icon">🔒</div>
    <div class="locked-title">${lesson.title}</div>
    <div class="locked-text">Complete <strong>${prevLes?.title||"the previous lesson"}</strong> first — mark it complete using the button at the bottom of that lesson.</div>`;
  if (prevLes) {
    const btn = document.createElement("button"); btn.className = "locked-prev";
    btn.textContent = `← Go back to ${prevLes.title}`;
    btn.addEventListener("click", () => { curLes=prevLes.id; curTab="do"; render(); });
    inner.appendChild(btn);
  }
  wrap.appendChild(inner); content.appendChild(wrap);
}

// ── Lesson ─────────────────────────────────────────────────────
function renderLesson(lesson, mod, content) {
  const lkey = `${mod.id}_${lesson.id}`;

  // If this is the first deep dive and all cores just got done — show a banner
  const firstOptional = (mod.lessons||[]).find(l=>!l.required);
  const justUnlockedDives = lesson.id === firstOptional?.id && allCoresDone(mod.id);
  if (justUnlockedDives) {
    const banner = document.createElement("div"); banner.className = "unlock-banner";
    banner.innerHTML = `<div class="unlock-banner-icon">🎉</div><div><div class="unlock-banner-title">Core lessons complete!</div><div class="unlock-banner-text">You've unlocked the Deep Dives — they're optional but worth exploring. Module 1 is now unlocked too!</div></div>`;
    content.appendChild(banner);
  }

  const tag = document.createElement("div"); tag.className = "lesson-tag-bar"; tag.style.color = mod.color; tag.textContent = `${mod.tag} · ${lesson.tag}`;
  const title = document.createElement("div"); title.className = "lesson-big-title"; title.textContent = lesson.title;
  content.appendChild(tag); content.appendChild(title);

  const tabRow = document.createElement("div"); tabRow.className = "tabs";
  ["learn","do"].forEach(t => {
    const tb = document.createElement("button"); tb.className = "tab-btn"+(curTab===t?" active":"");
    tb.textContent = t==="learn" ? "📖 Learn" : "✏️ Do the Work";
    tb.addEventListener("click", () => { curTab=t; render(); });
    tabRow.appendChild(tb);
  });

  const inner = document.createElement("div"); inner.style.maxWidth="640px";

function renderLearn(lesson, mod, wrap) {
  lesson.learn.sections.forEach(s => {
    const card = document.createElement("div"); card.className = "learn-card";
    const h = document.createElement("div"); h.className = "learn-heading"; h.textContent = s.h;

  });
  if (lesson.learn.mindset) {
    const mc = document.createElement("div"); mc.className = "mindset-card";

    mc.appendChild(ml); mc.appendChild(mt); wrap.appendChild(mc);

  const btn = document.createElement("button"); btn.className="btn-nav btn-next"; btn.style.background=mod.color; btn.textContent="Ready to do the work → ✏️";

function renderDo(lesson, mod, lkey, wrap) {
  lesson.tasks.forEach((task,i) => {
    const card = document.createElement("div"); card.className = "task-card";
    const lbl  = document.createElement("div"); lbl.className = "task-lbl";
    lbl.innerHTML = `<span class="task-num" style="color:${mod.color}">${i+1}. </span>${esc(task.label)}`;
    card.appendChild(lbl);
    const ak = `${lkey}_${task.id}`;

    if (task.type==="textarea") {
      const ta = document.createElement("textarea"); ta.placeholder=task.ph; ta.value=answers[ak]||"";
      ta.addEventListener("input", () => { answers[ak]=ta.value; saveAns(); });
      ta.addEventListener("focus", () => { ta.style.borderColor=mod.color; });
      ta.addEventListener("blur",  () => { ta.style.borderColor="#e0e3f0"; });
      card.appendChild(ta);
    } else if (task.type==="radio") {
      task.opts.forEach(opt => {
        const lrow = document.createElement("label"); lrow.className="radio-opt"+(answers[ak]===opt?" sel":"");
        lrow.style.borderColor=answers[ak]===opt?mod.color:"#e0e3f0";
        if(answers[ak]===opt) lrow.style.background=`${mod.color}10`;
        const inp = document.createElement("input"); inp.type="radio"; inp.name=ak; inp.checked=answers[ak]===opt; inp.style.accentColor=mod.color;
        inp.addEventListener("change", () => { answers[ak]=opt; saveAns(); render(); });
        lrow.appendChild(inp); lrow.appendChild(document.createTextNode(opt)); card.appendChild(lrow);
      });
    } else if (task.type==="checkbox") {
      const cur = answers[ak]||[];
      task.opts.forEach(opt => {
        const lrow = document.createElement("label"); lrow.className="check-opt"+(cur.includes(opt)?" sel":"");
        lrow.style.borderColor=cur.includes(opt)?mod.color:"#e0e3f0";
        if(cur.includes(opt)) lrow.style.background=`${mod.color}10`;
        const inp = document.createElement("input"); inp.type="checkbox"; inp.checked=cur.includes(opt); inp.style.accentColor=mod.color;
        inp.addEventListener("change", () => { const p=answers[ak]||[]; answers[ak]=inp.checked?[...p,opt]:p.filter(v=>v!==opt); saveAns(); render(); });
        lrow.appendChild(inp); lrow.appendChild(document.createTextNode(opt)); card.appendChild(lrow);
      });
    }
    wrap.appendChild(card);
  });

  if (lesson.prompts?.length) {
    const lbl = document.createElement("div"); lbl.className="prompt-section-lbl"; lbl.textContent="💬 AI Prompts — pre-filled with your context, ready to copy";
    wrap.appendChild(lbl);
    lesson.prompts.forEach(p => {
      const card    = document.createElement("div"); card.className="prompt-card";
      const heading = document.createElement("div"); heading.className="prompt-card-lbl"; heading.textContent=p.label;
      const hint    = document.createElement("div"); hint.className="prompt-hint"; hint.textContent=p.hint;
      const filled  = fillPrompt(p.template);
      const box     = document.createElement("div"); box.className="prompt-box"; box.textContent=filled;
      const ck      = `${lkey}_${p.label}`;
      const btnRow  = document.createElement("div"); btnRow.className = "prompt-btn-row";
      const cpBtn   = document.createElement("button"); cpBtn.className="btn-copy"+(copied[ck]?" copied":"");
      cpBtn.innerHTML = copied[ck]?"✓ Copied!":"📋 Copy Prompt";
      cpBtn.addEventListener("click", () => { navigator.clipboard&&navigator.clipboard.writeText(filled); copied[ck]=true; render(); setTimeout(()=>{copied[ck]=false;render();},2000); });
      const askBtn  = document.createElement("button"); askBtn.className="btn-ask-claude";
      askBtn.innerHTML = "✨ Create with AI";
      askBtn.addEventListener("click", () => {
        if (!panelOpen) togglePanel();
        else updatePanelContext();
        setTimeout(() => sendMessageText(filled), panelOpen ? 0 : 300);
      });
      btnRow.appendChild(cpBtn); btnRow.appendChild(askBtn);
      card.appendChild(heading); card.appendChild(hint); card.appendChild(box); card.appendChild(btnRow);
      wrap.appendChild(card);
    });
  }

  // Nav
  const nav  = document.createElement("div"); nav.className="nav-row";
  const left = document.createElement("div"); left.style.cssText="display:flex;gap:8px";
  const lessons = (MODULES.find(m=>m.id===curMod)?.lessons)||[];
  const li      = lessons.findIndex(l=>l.id===curLes);

  if (li > 0 && isLessonUnlocked(curMod, lessons[li-1].id)) {
    const prev = document.createElement("button"); prev.className="btn-nav btn-prev"; prev.textContent="← Previous";
    prev.addEventListener("click", () => { curLes=lessons[li-1].id; curTab="do"; chatHistory=[]; render(); if(panelOpen)updatePanelContext(); });
    left.appendChild(prev);
  }
  const nextLes = lessons[li+1];
  if (nextLes && done[`${curMod}_${curLes}`] && isLessonUnlocked(curMod, nextLes.id)) {
    const next = document.createElement("button"); next.className="btn-nav btn-next"; next.style.background=MODULES.find(m=>m.id===curMod).color; next.textContent="Next Lesson →";
    next.addEventListener("click", () => { curLes=nextLes.id; curTab="do"; chatHistory=[]; render(); if(panelOpen)updatePanelContext(); });
    left.appendChild(next);
  }
  nav.appendChild(left);

  const doneBtn = document.createElement("button"); doneBtn.className="btn-done"+(done[`${curMod}_${curLes}`]?" is-done":"");
  doneBtn.textContent = done[`${curMod}_${curLes}`] ? "✅ Marked Complete — click to undo" : "✓ Mark Lesson Complete";
  doneBtn.addEventListener("click", () => {
    const k = `${curMod}_${curLes}`;
    const wasDone = done[k];
    done[k] = !done[k]; saveDone();

    if (done[k] && !wasDone) {
      const mod = MODULES.find(m=>m.id===curMod);
      const mods = MODULES.filter(m=>m.ready);
      const modIdx = mods.findIndex(m=>m.id===curMod);
      const nextModObj = modIdx >= 0 && modIdx < mods.length-1 ? mods[modIdx+1] : null;
      const justFinishedAllModules = mods.every(m=>(m.lessons||[]).filter(l=>l.required).every(l=>done[`${m.id}_${l.id}`]));
      const justFinishedModule = !wasDone && allCoresDone(curMod);
      const wasModuleDoneBefore = (mod.lessons||[]).filter(l=>l.required).filter(l=>l.id!==curLes).every(l=>done[`${curMod}_${l.id}`]) === false;

      if (justFinishedAllModules) {
        render(); if(panelOpen) updatePanelContext();
        setTimeout(()=>showCelebration("all-done", mod, null), 300);
        return;
      } else if (justFinishedModule) {
        if (nextLes) { curLes=nextLes.id; curTab="learn"; chatHistory=[]; }
        render(); if(panelOpen) updatePanelContext();
        setTimeout(()=>showCelebration("module", mod, nextModObj), 300);
        return;
      } else {
        if (nextLes) { curLes=nextLes.id; curTab="learn"; chatHistory=[]; }
        render(); if(panelOpen) updatePanelContext();
        setTimeout(()=>showCelebration("lesson", mod, null), 300);
        return;
      }
    }

    // Undo case
    if (nextLes) { curLes=nextLes.id; curTab="learn"; chatHistory=[]; }
    render(); if(panelOpen) updatePanelContext();
  });
  nav.appendChild(doneBtn);

  // Download button when module cores are complete
  if (allCoresDone(curMod)) {
    const dlBtn = document.createElement("button");
    dlBtn.className = "btn-nav btn-prev";
    dlBtn.style.cssText = "display:flex;align-items:center;gap:5px";
    dlBtn.innerHTML = "📥 Download Module Progress";
    dlBtn.addEventListener("click", () => downloadModuleProgress(curMod));
    nav.appendChild(dlBtn);
  }

  wrap.appendChild(nav);
}

// ── Celebration ────────────────────────────────────────────────
function showCelebration(type, mod, nextMod) {
  const ov = document.createElement("div"); ov.className = "cel-ov";
  const bg = document.createElement("div"); bg.className = "cel-bg";
  const card = document.createElement("div"); card.className = "cel-c";

  // Confetti
  const conf = document.createElement("div"); conf.className = "conf";
  const colors = ["#F07830","#5ABF59","#14C4CC","#D91E8C","#7B6FD4","#FFD700"];
  for (let i = 0; i < 40; i++) {
    const dot = document.createElement("div"); dot.className = "cdot";
    dot.style.left = Math.random()*100+"%";
    dot.style.background = colors[Math.floor(Math.random()*colors.length)];
    dot.style.animationDelay = Math.random()*0.8+"s";
    conf.appendChild(dot);
  }
  card.appendChild(conf);

  let emoji, badge, badgeColor, title, text, buttons;

  if (type === "all-done") {
    emoji = "🏆"; badgeColor = "#FFD700"; badge = "INCREDIBLE";
    title = "You've Completed Everything!";
    text = "Every single lesson across all modules — done. You have a fully mapped-out membership blueprint. Time to make it real.";
    buttons = [{label:"View Dashboard", action:()=>{ov.remove();curView="home";render();}}];
  } else if (type === "module") {
    emoji = "🎉"; badgeColor = mod.color; badge = `${mod.tag.toUpperCase()} COMPLETE`;
    title = `${mod.name} — Done!`;
    text = nextMod
      ? `You've finished all the core lessons in ${mod.tag}. ${nextMod.tag}: ${nextMod.name} is now unlocked!`
      : `You've finished all the core lessons in ${mod.tag}. Deep dives are available if you want to go further.`;
    buttons = [];
    if (nextMod) buttons.push({label:`Start ${nextMod.tag} →`, action:()=>{ov.remove();curView="lesson";curMod=nextMod.id;curLes=(nextMod.lessons||[])[0]?.id||"cl1";curTab="learn";expanded[nextMod.id]=true;saveExp();chatHistory=[];render();}});
    buttons.push({label:"Stay Here", action:()=>{ov.remove();}});
  } else {
    emoji = "✅"; badgeColor = mod.color; badge = "LESSON COMPLETE";
    title = "Nice Work!";
    text = "Lesson marked complete. Keep the momentum going!";
    buttons = [{label:"Continue", action:()=>{ov.remove();}}];
  }

  const emEl = document.createElement("span"); emEl.className = "cel-em"; emEl.textContent = emoji;
  const bdEl = document.createElement("div"); bdEl.className = "cel-bd"; bdEl.style.background = badgeColor; bdEl.textContent = badge;
  const ttEl = document.createElement("div"); ttEl.className = "cel-tt"; ttEl.textContent = title;
  const txEl = document.createElement("div"); txEl.className = "cel-tx"; txEl.textContent = text;
  const bsEl = document.createElement("div"); bsEl.className = "cel-bs";

  buttons.forEach((b, i) => {
    const btn = document.createElement("button");
    btn.className = i === 0 ? "btn-cn" : "btn-cc";
    btn.textContent = b.label;
    btn.addEventListener("click", b.action);
    bsEl.appendChild(btn);
  });

  card.appendChild(emEl); card.appendChild(bdEl); card.appendChild(ttEl); card.appendChild(txEl); card.appendChild(bsEl);
  ov.appendChild(bg); ov.appendChild(card);
  bg.addEventListener("click", () => ov.remove());
  document.body.appendChild(ov);
}

// ── Home / Dashboard ───────────────────────────────────────────
function renderHome(content) {
  const hw = document.createElement("div"); hw.className = "hw";

  // Find where to continue
  let continueModId = null, continueLesId = null;
  for (const mod of MODULES.filter(m=>m.ready && isModuleUnlocked(m.id))) {
    for (const l of (mod.lessons||[])) {
      if (!done[`${mod.id}_${l.id}`] && isLessonUnlocked(mod.id, l.id)) {
        continueModId = mod.id; continueLesId = l.id; break;
      }
    }
    if (continueModId) break;
  }

  const pct = totalLessons() ? Math.round((totalDone()/totalLessons())*100) : 0;
  const greeting = document.createElement("div"); greeting.className = "hg";
  greeting.textContent = `Welcome back, ${ctx?.name || "there"}!`;
  hw.appendChild(greeting);

  const sub = document.createElement("div"); sub.className = "hsubg";
  sub.textContent = `You've completed ${totalDone()} of ${totalLessons()} lessons (${pct}%)`;
  hw.appendChild(sub);

  if (continueModId) {
    const cMod = MODULES.find(m=>m.id===continueModId);
    const cLes = (cMod?.lessons||[]).find(l=>l.id===continueLesId);
    const cont = document.createElement("button"); cont.className = "hcont";
    cont.innerHTML = `Continue: ${cMod?.tag} — ${cLes?.title} →`;
    cont.addEventListener("click", () => {
      curView="lesson"; curMod=continueModId; curLes=continueLesId; curTab="learn";
      expanded[continueModId]=true; saveExp(); chatHistory=[]; render();
    });
    hw.appendChild(cont);
  }

  // Module cards
  const st = document.createElement("div"); st.className = "hst"; st.textContent = "YOUR MODULES";
  hw.appendChild(st);

  const grid = document.createElement("div"); grid.className = "mcards";
  MODULES.forEach(mod => {
    const card = document.createElement("div");
    const modUnlocked = mod.ready && isModuleUnlocked(mod.id);
    card.className = "mcard" + (!modUnlocked?" mlk":"");

    const lessons = mod.lessons || [];
    const doneCnt = lessons.filter(l => done[`${mod.id}_${l.id}`]).length;
    const totalCnt = lessons.length;
    const modPct = totalCnt ? Math.round((doneCnt/totalCnt)*100) : 0;

    const bar = document.createElement("div"); bar.className = "mcbar-bg";
    const fill = document.createElement("div"); fill.className = "mcbar-fill";
    fill.style.width = modPct + "%"; fill.style.background = mod.color;
    bar.appendChild(fill); card.appendChild(bar);

    const tag = document.createElement("div"); tag.className = "mctag"; tag.textContent = mod.tag;
    const name = document.createElement("div"); name.className = "mcname"; name.textContent = mod.name;
    const prog = document.createElement("div"); prog.className = "mcprog";
    prog.innerHTML = `<span>${doneCnt}/${totalCnt} lessons</span><span>${modPct}%</span>`;
    card.appendChild(tag); card.appendChild(name); card.appendChild(prog);

    // Download button for completed modules
    if (modUnlocked && doneCnt > 0 && allCoresDone(mod.id)) {
      const dl = document.createElement("button");
      dl.style.cssText = "margin-top:8px;width:100%;background:#f0f2f8;color:#555;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s";
      dl.textContent = "📥 Download Progress";
      dl.addEventListener("click", (e) => { e.stopPropagation(); downloadModuleProgress(mod.id); });
      card.appendChild(dl);
    }

    if (modUnlocked) {
      card.addEventListener("click", () => {
        curView="lesson"; curMod=mod.id; curLes=(mod.lessons||[])[0]?.id||"cl1"; curTab="learn";
        expanded[mod.id]=true; saveExp(); chatHistory=[]; render();
      });
    }
    grid.appendChild(card);
  });
  hw.appendChild(grid);

  // Recent answers overview
  const answeredMods = MODULES.filter(m => m.ready && (m.lessons||[]).some(l => l.tasks.some(t => {
    const v = answers[`${m.id}_${l.id}_${t.id}`];
    return v && (typeof v === "string" ? v.trim() : v.length);
  })));
  if (answeredMods.length) {
    const ost = document.createElement("div"); ost.className = "hst"; ost.textContent = "YOUR KEY DECISIONS";
    hw.appendChild(ost);
    const ocards = document.createElement("div"); ocards.className = "ocards";
    answeredMods.forEach(mod => {
      (mod.lessons||[]).forEach(l => {
        const lkey = `${mod.id}_${l.id}`;
        l.tasks.forEach(t => {
          const v = answers[`${lkey}_${t.id}`];
          if (!v || (typeof v==="string" && !v.trim()) || (Array.isArray(v) && !v.length)) return;
          const display = Array.isArray(v) ? v.join(", ") : v;
          if (display.length < 5) return;
          const oc = document.createElement("div"); oc.className = "ocard";
          oc.addEventListener("click", () => {
            curView="lesson"; curMod=mod.id; curLes=l.id; curTab="do";
            expanded[mod.id]=true; saveExp(); chatHistory=[]; render();
          });
          const olbl = document.createElement("div"); olbl.className = "olbl"; olbl.textContent = `${mod.tag} · ${l.title}`;
          const oval = document.createElement("div"); oval.className = "oval"; oval.textContent = display.length > 120 ? display.slice(0,120)+"…" : display;
          oc.appendChild(olbl); oc.appendChild(oval); ocards.appendChild(oc);
        });
      });
    });
    // Only show first 8
    while (ocards.children.length > 8) ocards.removeChild(ocards.lastChild);
    hw.appendChild(ocards);
  }

  content.appendChild(hw);
}

// ── Download Progress ──────────────────────────────────────────
function downloadModuleProgress(modId) {
  const mod = MODULES.find(m=>m.id===modId);
  if (!mod) return;

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${mod.tag}: ${mod.name} — Progress Report</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;max-width:700px;margin:0 auto;padding:40px 30px;color:#222;line-height:1.7}
  h1{font-size:24px;font-weight:900;color:#1C2B1C;margin-bottom:4px;font-family:system-ui,sans-serif}
  .sub{font-size:13px;color:#888;margin-bottom:30px;border-bottom:2px solid ${mod.color};padding-bottom:14px}
  .ctx{font-size:12px;color:#666;background:#f8f9fa;padding:12px 16px;border-radius:8px;margin-bottom:28px;line-height:1.8}
  .ctx strong{color:#1C2B1C}
  h2{font-size:16px;font-weight:800;color:${mod.color};margin:28px 0 4px;font-family:system-ui,sans-serif;border-left:3px solid ${mod.color};padding-left:10px}
  h3{font-size:13px;font-weight:700;color:#1C2B1C;margin:16px 0 6px;font-family:system-ui,sans-serif}
  .answer{font-size:13px;color:#333;background:#f5f6fa;padding:10px 14px;border-radius:6px;margin-bottom:12px;white-space:pre-wrap;border-left:2px solid #ddd}
  .empty{font-size:12px;color:#ccc;font-style:italic;margin-bottom:12px}
  .done-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;font-family:system-ui,sans-serif}
  .footer{margin-top:40px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#bbb;text-align:center}
  @media print{body{padding:20px}h2{break-before:auto}@page{margin:1.5cm}}
</style></head><body>`;

  html += `<h1>${esc(mod.tag)}: ${esc(mod.name)}</h1>`;
  html += `<div class="sub">TME+ Membership Sidekick — Progress Report · Generated ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</div>`;
  html += `<div class="ctx"><strong>Name:</strong> ${esc(ctx?.name||"—")}<br><strong>Target Market:</strong> ${esc(ctx?.market||"—")}<br><strong>Focus:</strong> ${esc(ctx?.focus||"—")}<br><strong>Identity:</strong> ${esc(ctx?.identity||"—")}</div>`;

  (mod.lessons||[]).forEach(l => {
    const lkey = `${mod.id}_${l.id}`;
    const isDone = done[lkey];
    const hasAnswers = l.tasks.some(t => {
      const v = answers[`${lkey}_${t.id}`];
      return v && (typeof v==="string" ? v.trim() : v.length);
    });
    if (!hasAnswers && !isDone) return;

    html += `<h2>${esc(l.tag)}: ${esc(l.title)}${isDone?'<span class="done-badge">COMPLETE</span>':""}</h2>`;

    l.tasks.forEach(t => {
      const v = answers[`${lkey}_${t.id}`];
      const display = v ? (Array.isArray(v) ? v.join(", ") : v) : "";
      html += `<h3>${esc(t.label)}</h3>`;
      if (display.trim()) {
        html += `<div class="answer">${esc(display)}</div>`;
      } else {
        html += `<div class="empty">Not yet answered</div>`;
      }
    });
  });

  html += `<div class="footer">Generated by TME+ Membership Sidekick · ${esc(ctx?.name||"")} · ${new Date().toLocaleDateString()}</div>`;
  html += `</body></html>`;

  const blob = new Blob([html], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${mod.tag.replace(/\s+/g,"-")}_${mod.name}_Progress.html`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Setup ──────────────────────────────────────────────────────
function renderSetup() {
  const wrap  = document.createElement("div"); wrap.style.cssText="display:flex;flex-direction:column;flex:1";
  const inner = document.createElement("div"); inner.className="setup-wrap";
  const card  = document.createElement("div"); card.className="setup-card";
  card.innerHTML=`<div style="text-align:center;font-size:42px;margin-bottom:10px">🚀</div>
    <h1>Welcome to Your TME+ Sidekick</h1>
    <p>Set up your context once and your built-in AI membership coach will know exactly who you are and what you're building as you work through every module.</p>`;

  const fields=[{k:"name",lbl:"Your first name",ph:"e.g. Sarah"},{k:"market",lbl:"My target market are…",ph:"e.g. portrait photographers who want to build recurring income"},{k:"focus",lbl:"My area of focus is…",ph:"e.g. helping them launch and grow a membership community"},{k:"identity",lbl:"I am a…",ph:"e.g. business coach and educator for creative entrepreneurs"}];
  const form={name:"",market:"",focus:"",identity:""};

  fields.forEach(f => {
    const lbl=document.createElement("label"); lbl.textContent=f.lbl;
    const inp=document.createElement("input"); inp.placeholder=f.ph;
    inp.addEventListener("input",()=>{form[f.k]=inp.value.trim();btn.disabled=!fields.every(x=>form[x.k]);});
    card.appendChild(lbl); card.appendChild(inp);
  });

  const btn=document.createElement("button"); btn.className="btn-primary"; btn.textContent="Let's Get Started →"; btn.disabled=true;
  btn.addEventListener("click",()=>{ctx={...form};saveCtx();curView="home";curMod="m0";curLes="cl1";curTab="learn";expanded={m0:true};saveExp();render();});
  card.appendChild(btn);

  const note=document.createElement("p"); note.style.cssText="text-align:center;font-size:11px;color:#bbb;margin-top:10px"; note.textContent="You can update this anytime from the sidebar. Your answers save automatically.";
  card.appendChild(note); inner.appendChild(card); wrap.appendChild(inner);
  return wrap;
}

render();
</script>
</body>
</html>
