<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TME+ Membership Sidekick</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f6fa;color:#222;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

.setup-wrap{background:linear-gradient(135deg,#1C2B1C,#2A3D28);display:flex;align-items:center;justify-content:center;padding:40px 20px;flex:1}
.setup-card{background:#fff;border-radius:16px;padding:36px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.setup-card h1{font-size:20px;font-weight:900;color:#1C2B1C;margin:10px 0 6px}
.setup-card p{font-size:13px;color:#666;line-height:1.6;margin-bottom:22px}
.setup-card label{display:block;font-size:11px;font-weight:800;color:#1C2B1C;margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
.setup-card input{width:100%;padding:9px 12px;border:1.5px solid #e0e3f0;border-radius:7px;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s;margin-bottom:12px}
.setup-card input:focus{border-color:#F07830}
.btn-primary{width:100%;background:linear-gradient(135deg,#F07830,#e06820);color:#fff;border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;font-family:inherit}
.btn-primary:disabled{background:#ccc;cursor:default}

#header{background:#1C2B1C;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo-title{font-weight:900;font-size:14px}
.hlogo-sub{font-size:10px;opacity:.45}
.hprog{display:flex;align-items:center;gap:14px}
.hprog-inner{text-align:right}
.hprog-label{font-size:9px;opacity:.5;letter-spacing:.5px;text-transform:uppercase}
.hprog-val{font-size:12px;font-weight:700;margin-bottom:3px}
.prog-bar{width:80px;height:4px;background:rgba(255,255,255,.15);border-radius:3px;margin-left:auto}
.prog-fill{height:100%;background:#5ABF59;border-radius:3px;transition:width .4s}
.btn-claude-toggle{display:flex;align-items:center;gap:9px;background:linear-gradient(135deg,#F07830,#e06820);border:none;color:#fff;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;flex-shrink:0;box-shadow:0 4px 14px rgba(240,120,48,.45)}
.btn-claude-toggle:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,120,48,.55)}
.btn-claude-toggle.active{background:rgba(255,255,255,.15);box-shadow:none;border:1px solid rgba(255,255,255,.2)}
.claude-dot{width:8px;height:8px;border-radius:50%;background:#5ABF59;flex-shrink:0;box-shadow:0 0 6px #5ABF59}

#body-row{display:flex;flex:1;overflow:hidden}

#sidebar{width:215px;background:#243222;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column}
.mod-group{border-bottom:1px solid rgba(255,255,255,.06)}
.mod-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:background .15s;user-select:none}
.mod-header:hover{background:rgba(255,255,255,.04)}
.mod-header.active-mod{background:rgba(240,120,48,.15)}
.mod-header.locked-mod{cursor:default;opacity:.6}
.mod-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mod-tag{font-size:9px;font-weight:800;letter-spacing:.7px;opacity:.4;color:#fff;text-transform:uppercase}
.mod-name{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.7);line-height:1.3;margin-top:1px}
.mod-name.locked{opacity:.35}
.mod-chevron{font-size:10px;color:rgba(255,255,255,.25);transition:transform .2s;flex-shrink:0}
.mod-chevron.open{transform:rotate(90deg)}
.lessons-list{overflow:hidden;transition:max-height .25s ease}
.lesson-btn{display:flex;align-items:flex-start;gap:8px;width:100%;padding:7px 14px 7px 30px;border:none;cursor:pointer;background:transparent;text-align:left;color:rgba(255,255,255,.45);border-left:2px solid transparent;transition:all .15s;font-family:inherit}
.lesson-btn:hover:not(.lesson-locked){background:rgba(255,255,255,.04);color:rgba(255,255,255,.7)}
.lesson-btn.active{background:rgba(240,120,48,.2);border-left-color:#F07830;color:#fff}
.lesson-btn.lesson-locked{cursor:default;opacity:.35}
.ltag{font-size:8.5px;font-weight:800;letter-spacing:.6px;opacity:.5;margin-bottom:1px;text-transform:uppercase}
.ltitle{font-size:11px;font-weight:500;line-height:1.35}
.licon{font-size:12px;flex-shrink:0;margin-top:1px}
.optional-badge{font-size:8px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);border-radius:3px;padding:1px 4px;margin-top:2px;display:inline-block;letter-spacing:.4px;text-transform:uppercase}
.sidebar-footer{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.sf-label{font-size:9.5px;color:rgba(255,255,255,.25);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.sf-name{font-size:11px;color:rgba(255,255,255,.4);font-style:italic;line-height:1.4}
.sf-edit{margin-top:5px;font-size:10px;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit;padding:0}

#content{flex:1;overflow-y:auto;padding:22px 26px;background:#f5f6fa;transition:margin-right .25s}
.lesson-tag-bar{font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px}
.lesson-big-title{font-size:20px;font-weight:900;color:#1C2B1C;margin-bottom:16px}
.tabs{display:flex;gap:3px;background:#e8eaf0;border-radius:8px;padding:3px;width:fit-content;margin-bottom:16px}
.tab-btn{padding:6px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:#777;transition:all .15s;font-family:inherit}
.tab-btn.active{background:#fff;color:#1C2B1C;box-shadow:0 1px 4px rgba(0,0,0,.09)}

.learn-card{background:#fff;border-radius:9px;padding:14px 16px;margin-bottom:11px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.learn-heading{font-size:13px;font-weight:800;color:#1C2B1C;margin-bottom:8px}
.learn-card ul{padding-left:16px}
.learn-card li{font-size:13px;color:#444;margin-bottom:5px;line-height:1.55}
.mindset-card{border-radius:9px;padding:13px 15px;margin-bottom:14px;border:1px solid rgba(240,120,48,.2);background:linear-gradient(135deg,rgba(240,120,48,.05),rgba(90,191,89,.05))}
.mindset-lbl{font-size:9.5px;font-weight:800;letter-spacing:1px;margin-bottom:5px}
.mindset-txt{font-size:13.5px;font-style:italic;color:#1C2B1C;line-height:1.65}

.task-card{background:#fff;border-radius:9px;padding:14px 16px;margin-bottom:11px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.task-lbl{font-size:13px;font-weight:700;color:#1C2B1C;margin-bottom:9px;line-height:1.5;white-space:pre-line}
.task-num{font-weight:900}
textarea{width:100%;min-height:86px;padding:9px 11px;border:1.5px solid #e0e3f0;border-radius:7px;font-size:13px;color:#333;resize:vertical;outline:none;font-family:inherit;line-height:1.55;transition:border-color .15s}
.radio-opt,.check-opt{display:flex;align-items:center;gap:9px;cursor:pointer;padding:7px 11px;border-radius:7px;border:1.5px solid #e0e3f0;background:#fff;margin-bottom:6px;font-size:13px;color:#333;transition:all .15s}

.prompt-section-lbl{font-size:10px;font-weight:800;color:#999;letter-spacing:.8px;text-transform:uppercase;margin:18px 0 9px}
.prompt-card{background:#fff;border-radius:9px;padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid #eceef5}
.prompt-card-lbl{font-size:12.5px;font-weight:800;color:#1C2B1C;margin-bottom:5px}
.prompt-hint{font-size:11.5px;color:#888;margin-bottom:9px;line-height:1.5}
.prompt-box{background:#f8f9ff;border:1px solid #e0e3f0;border-radius:7px;padding:11px 13px;font-size:12px;color:#555;line-height:1.7;white-space:pre-wrap;font-family:inherit;margin-bottom:9px;max-height:180px;overflow-y:auto}
.btn-copy{display:inline-flex;align-items:center;gap:6px;background:#f0f2f8;color:#555;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-copy.copied{background:#d1fae5;color:#065f46}
.prompt-btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-ask-claude{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1C2B1C,#2A6B2A);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 2px 8px rgba(28,43,28,.2)}
.btn-ask-claude:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(28,43,28,.3)}
.btn-ask-claude:disabled{opacity:.5;cursor:default;transform:none}

/* UNLOCK BANNER */
.unlock-banner{background:linear-gradient(135deg,rgba(90,191,89,.12),rgba(240,120,48,.08));border:1.5px solid rgba(90,191,89,.3);border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
.unlock-banner-icon{font-size:22px;flex-shrink:0}
.unlock-banner-title{font-size:13px;font-weight:800;color:#1C2B1C;margin-bottom:3px}
.unlock-banner-text{font-size:12.5px;color:#555;line-height:1.55}

/* LOCKED LESSON */
.locked-lesson-screen{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:60px 40px}
.locked-inner{max-width:360px}
.locked-icon{font-size:44px;margin-bottom:14px}
.locked-title{font-size:18px;font-weight:900;color:#1C2B1C;margin-bottom:8px}
.locked-text{font-size:13.5px;color:#888;line-height:1.65}
.locked-prev{display:inline-block;margin-top:14px;background:#F07830;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

.nav-row{display:flex;align-items:center;justify-content:space-between;padding-top:14px;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.btn-nav{border:none;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit}
.btn-prev{background:#e8eaf0;color:#555}
.btn-next{color:#fff;font-weight:800;border:none}
.btn-done{border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:800;font-family:inherit;background:#5ABF59;color:#fff;border:none;transition:all .2s}
.btn-done.is-done{background:#d1fae5;color:#065f46;border:1.5px solid #5ABF59}

#claude-panel{position:fixed;top:0;right:0;width:360px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform .25s ease}
#claude-panel.open{transform:translateX(0)}
.cp-header{background:linear-gradient(135deg,#1C2B1C,#2A3D28);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cp-title{display:flex;align-items:center;gap:9px}
.cp-title-text{font-weight:800;font-size:14px}
.cp-subtitle{font-size:10px;opacity:.55;margin-top:1px}
.cp-close{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;font-family:inherit}
.cp-context-bar{background:#f8fff8;border-bottom:1px solid #e0f0e0;padding:8px 14px;font-size:11px;color:#888;flex-shrink:0}
.cp-context-bar span{color:#3A8A39;font-weight:600}
.cp-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.cp-welcome{background:linear-gradient(135deg,rgba(90,191,89,.08),rgba(240,120,48,.06));border:1px solid rgba(90,191,89,.2);border-radius:10px;padding:13px 14px}
.cp-welcome-title{font-size:12px;font-weight:800;color:#1C2B1C;margin-bottom:5px}
.cp-welcome-text{font-size:12px;color:#666;line-height:1.6}
.cp-suggestions{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.cp-suggestion{background:#fff;border:1px solid #d0e8d0;border-radius:7px;padding:7px 10px;font-size:11.5px;color:#3A8A39;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;line-height:1.4}
.cp-suggestion:hover{background:#f0fff0;border-color:#5ABF59}
.msg{display:flex;flex-direction:column;gap:3px;max-width:100%}
.msg-user{align-items:flex-end}
.msg-claude{align-items:flex-start}
.msg-bubble{padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.6;max-width:88%}
.msg-user .msg-bubble{background:linear-gradient(135deg,#F07830,#e06820);color:#fff;border-bottom-right-radius:3px}
.msg-claude .msg-bubble{background:#f5f6fa;color:#333;border-bottom-left-radius:3px;border:1px solid #eceef5;white-space:pre-wrap}
.msg-label{font-size:10px;color:#bbb;padding:0 4px}
.cp-typing{display:flex;align-items:center;gap:5px;padding:10px 12px;background:#f5f6fa;border-radius:10px;width:fit-content;border:1px solid #eceef5}
.cp-typing span{width:6px;height:6px;background:#bbb;border-radius:50%;animation:bounce .9s infinite}
.cp-typing span:nth-child(2){animation-delay:.2s}
.cp-typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.cp-input-row{border-top:1px solid #eceef5;padding:12px 14px;display:flex;gap:8px;flex-shrink:0;background:#fff}
#cp-input{flex:1;border:1.5px solid #e0e3f0;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.5;transition:border-color .15s}
#cp-input:focus{border-color:#F07830}
.cp-send{background:linear-gradient(135deg,#F07830,#e06820);color:#fff;border:none;border-radius:8px;padding:9px 13px;cursor:pointer;font-size:16px;flex-shrink:0;transition:opacity .2s}
.cp-send:disabled{opacity:.4;cursor:default}
/* NAV BTNS */
.btn-home{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}
.btn-home:hover,.btn-home.ah{background:rgba(255,255,255,.2)}
.btn-bp{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.75);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}
.btn-bp:hover{background:rgba(255,255,255,.15);color:#fff}
.btn-hbg{display:none;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:8px;padding:7px 10px;font-size:16px;cursor:pointer;flex-shrink:0}
/* SEARCH */
.search-wrap{position:relative;flex-shrink:0}
.btn-search{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}
.btn-search:hover{background:rgba(255,255,255,.2)}
.search-drop{position:absolute;top:calc(100% + 6px);right:0;width:340px;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.18);z-index:200;overflow:hidden;display:none}
.search-drop.open{display:block}
.search-input{width:100%;padding:11px 14px;border:none;border-bottom:1px solid #eee;font-size:13px;font-family:inherit;outline:none}
.search-results{max-height:320px;overflow-y:auto;padding:6px 0}
.search-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid #f5f5f5}
.search-item:hover{background:#f8f9ff}
.search-item:last-child{border-bottom:none}
.si-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.si-tag{font-size:9px;font-weight:800;letter-spacing:.5px;color:#aaa;text-transform:uppercase}
.si-title{font-size:12.5px;font-weight:600;color:#1C2B1C;line-height:1.3}
.si-match{font-size:11px;color:#888;line-height:1.4;margin-top:2px}
.si-match mark{background:#fff3cd;color:#333;border-radius:2px;padding:0 1px}
.search-empty{padding:20px 14px;text-align:center;font-size:12.5px;color:#bbb}
@media(max-width:680px){.search-drop{width:calc(100vw - 20px);right:-40px}.btn-search span{display:none}}
/* HOME */
.hw{padding:22px 26px;overflow-y:auto;flex:1}
.hg{font-size:21px;font-weight:900;color:#1C2B1C;margin-bottom:3px}
.hsubg{font-size:13px;color:#888;margin-bottom:20px}
.hcont{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#F07830,#e06820);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:26px;box-shadow:0 4px 12px rgba(240,120,48,.3);transition:all .2s}
.hcont:hover{transform:translateY(-1px)}
.hst{font-size:10px;font-weight:800;color:#bbb;letter-spacing:.8px;text-transform:uppercase;margin-bottom:11px;margin-top:20px}
.mcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:10px}
.mcard{background:#fff;border-radius:11px;padding:14px 15px;box-shadow:0 1px 6px rgba(0,0,0,.06);cursor:pointer;transition:all .18s;border:2px solid transparent}
.mcard:hover:not(.mlk){transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.09)}
.mlk{opacity:.4;cursor:default}
.mcbar-bg{height:3px;background:#f0f0f0;border-radius:3px;margin-bottom:11px}
.mcbar-fill{height:100%;border-radius:3px;transition:width .4s}
.mctag{font-size:9px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:#bbb;margin-bottom:2px}
.mcname{font-size:13px;font-weight:800;color:#1C2B1C;margin-bottom:8px}
.mcprog{font-size:11px;color:#aaa;display:flex;justify-content:space-between}
.ocards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ocard{background:#fff;border-radius:10px;padding:13px 15px;box-shadow:0 1px 5px rgba(0,0,0,.05);border-left:3px solid #F07830;cursor:pointer;transition:border-color .15s}
.ocard:hover{border-left-color:#e06820}
.olbl{font-size:9.5px;font-weight:800;color:#F07830;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.oval{font-size:12.5px;color:#444;line-height:1.5;max-height:55px;overflow:hidden}
/* BLUEPRINT */
.bp-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.bp-mo{background:#fff;border-radius:16px;padding:32px;max-width:660px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);margin:auto}
.bp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #eee;flex-wrap:wrap;gap:10px}
.bp-ht{font-size:19px;font-weight:900;color:#1C2B1C}
.bp-b{display:flex;gap:8px}
.btn-pr{background:#1C2B1C;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cbp{background:#f0f2f8;color:#555;border:none;border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.bp-mod{margin-bottom:20px}
.bp-mh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;border-radius:5px;color:#fff;margin-bottom:10px;display:inline-block}
.bp-f{margin-bottom:9px;padding-left:11px;border-left:2px solid #f0f0f0}
.bp-fl{font-size:9px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.bp-fv{font-size:12.5px;color:#333;line-height:1.5;white-space:pre-wrap}
/* CELEBRATION */
.cel-ov{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.cel-bg{position:absolute;inset:0;background:rgba(0,0,0,.65)}
.cel-c{position:relative;background:#fff;border-radius:20px;padding:40px 34px;max-width:410px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:cIn .35s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
@keyframes cIn{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
.cel-em{font-size:52px;display:block;margin-bottom:10px}

            {h:"The 6 Membership Models", items:["📰 Publisher — monthly fresh content, like an online magazine","📦 UPS — deliver a package of content on a schedule (physical or digital)","🎓 Coaching — hands-on guidance and coaching environment","👥 Community — shared-interest gathering space","💧 Drip — sequential content delivered over months or years","🔀 Combo — mix and match from the other five"]}
          ],
          mindset:"Your model doesn't have to be perfect or final. It will likely evolve as your membership grows. Right now, choose the structure that feels like the best fit."
        },
        tasks:[
          {id:"mem_type", label:"My membership type:", type:"radio", opts:["Product-Based","Service-Based","Community-Based","Information-Based"]},
          {id:"type_why", label:"This type makes sense for me because:", type:"textarea", ph:"What about this type fits how you want to show up and deliver value?"},
          {id:"mem_model", label:"My membership model:", type:"radio", opts:["Publisher","UPS","Coaching","Community","Drip","Combo"]},
          {id:"model_why", label:"This model makes sense for my members because:", type:"textarea", ph:"How will this model help your members get results? How does it fit your lifestyle?"}
        ],
        prompts:[],
        suggestions:["Which membership model fits my lifestyle and how I want to show up?","What's the difference between the Publisher and Drip model for my situation?","Can you help me think through which type fits my membership idea?"]
      },
      {
        id:"cl2", tag:"Core Lesson 2", title:"#1 Reason Why People Cancel", required:true,
        learn:{
          sections:[
            {h:"Overwhelm kills memberships", items:["The #1 reason people cancel isn't the price — it's overwhelm","Members can't find what they need, don't know what to do next, and feel behind","They feel bad spending money and not getting anywhere — so they leave","More content does NOT equal more value. Progress equals value."]},
            {h:"Real examples", items:["Paul Evans — stripped everything except PowerPoint templates for youth pastors. Retention increased.","Jamie Bright — simplified to one strategy per month for photographers. Content consumption and client wins skyrocketed."]},
            {h:"The fix", items:["Design for results, not volume","Give members a clear path to follow (that's next lesson — the Success Path™)","Prioritize quick wins over comprehensive libraries"]}
          ],
          mindset:"Your job isn't to teach everything — it's to guide people forward. Progress builds confidence. Confidence builds momentum. Momentum builds long-term members."
        },
        tasks:[
          {id:"overwhelm_audit", label:"If I'm honest, where might my membership create overwhelm right now?", type:"textarea", ph:"Too much content? No clear starting point? Members not sure what to do next?"},
          {id:"one_thing", label:"If members could only keep ONE thing from my membership, what would it be?", type:"textarea", ph:"This is your most valuable asset — the thing that solves their real problem most directly."}
        ],
        prompts:[],
        suggestions:["How do I know if my membership is overwhelming my members?","What's the right amount of content to include each month?","How did other memberships simplify successfully?"]
      },
      {
        id:"cl3", tag:"Core Lesson 3", title:"The Success Path™", required:true,
        learn:{
          sections:[
            {h:"What is the Success Path™?", items:["A built-in measuring stick of member success","Breaks the journey into 3–7 clearly defined stages (5 is the sweet spot)","Impacts retention, marketing, community, onboarding, and celebrations","It's a work in progress — version 1.0 is all you need to start"]},
            {h:"The 4 Elements of a Success Path™", items:["📍 Stages — 3 to 7 named stages that define the journey","📝 Descriptions — what the member is thinking, feeling, doing at each stage","✅ Milestones — clear yes/no checkpoints (not 'feels confident' — 'has written their positioning statement')","⚡ Action Items — specific tasks that support each milestone"]}
          ],
          mindset:"Small wins deserve big celebrations. The Success Path™ helps your members see their progress — and that's what keeps them moving forward."
        },
        tasks:[
          {id:"path_name", label:"The name of my Success Path™:", type:"textarea", ph:"e.g. 'The Confident Homeschool Journey' or 'The Portrait Photographer's Roadmap'"},
          {id:"num_stages", label:"How many stages will my Success Path™ have?", type:"radio", opts:["3 stages","4 stages","5 stages (recommended)","6 stages","7 stages"]},
          {id:"stages", label:"My stage names and descriptions (paste your AI output here, then make it yours):", type:"textarea", ph:"Stage 1: [Name]\nDescription: [What are they thinking, feeling, doing at this stage?]\nMilestones:\n- \nAction Items:\n- \n\nStage 2: [Name]..."},
        ],
        prompts:[
          {label:"Map Out Your Full Success Path™", hint:"Use this to generate all stages, descriptions, milestones and action items in one go.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI would like your help mapping out a Success Path™ that takes my members from where they are now to [describe the final transformation].\n\nI would like 5 stages.\n\nPlease include for each stage:\n• The stage name\n• A description of what the member is thinking, feeling, and doing at this stage\n• 3 key milestones (specific, yes/no checkpoints)\n• 2–3 action items to support each milestone\n\nAssume members are starting from scratch.\n\nDo you understand?"}
        ],
        suggestions:["Can you help me name my Success Path™ stages in a way that feels exciting and clear?","How do I write good milestones — what makes them specific enough?","Can you review my stage descriptions and make them feel more relatable?"]
      },
      {
        id:"cl4", tag:"Core Lesson 4", title:"3 Types of Must-Have Membership Content", required:true,
        learn:{
          sections:[
            {h:"1. Onboarding Content", items:["The first experience new members have — one of the most important","Positive first 30 days triples lifetime value","Guide members through intentional steps — not an overwhelming menu","Welcome video → profile setup → short survey → clear next step"]},
            {h:"2. Core Content", items:["Built around your Success Path™ — gets everyone aligned","One video per stage explaining: what they're thinking/feeling, what to focus on, what progress looks like","Intro video + one per stage + closing/summary video"]},
            {h:"3. Monthly Content", items:["Your ongoing deliverables — what moves members forward month after month","Examples: masterclasses, live Q&As, resource drops, challenges, workshops","Keep it to 60 minutes of learning per week max — members need time to implement","Match content type and volume to your membership model"]}
          ],
          mindset:"Your content isn't a library — it's a roadmap. Keep it focused on creating clarity and quick wins. That's how members build momentum and stick around."
        },
        tasks:[
          {id:"onboard_plan", label:"My onboarding experience will include:", type:"textarea", ph:"Welcome video? Survey? 'Start here' guide? Getting started steps? What's the first thing a new member will see and do?"},
          {id:"core_content_plan", label:"My core content plan (one video per Success Path™ stage):", type:"textarea", ph:"Intro video → Stage 1 video → Stage 2 video... → Summary video\nWhat's the key message for each?"},
          {id:"monthly_deliverable", label:"My monthly deliverable(s):", type:"textarea", ph:"What will members receive each month? (e.g. one masterclass + one live Q&A). Keep it simple — 1-2 to start."}
        ],
        prompts:[],
        suggestions:["What should go in my welcome video to set the right tone?","How do I structure my core content videos so they're short but impactful?","What monthly deliverable makes the most sense for my model and audience?"]
      },
      {
        id:"ddl1", tag:"Deep Dive 1", title:"Creating Your Onboarding Content", required:false,
        learn:{
          sections:[
            {h:"3 Objectives of Great Onboarding", items:["🎯 Clarity — help members identify where they are on the Success Path™, eliminate 'where do I start?'","🤝 Connection — one meaningful connection can change everything; prompt introductions, use a member directory","🏆 Progress — help new members get a win within their first week (complete a checklist, post in community, download a template)"]},
            {h:"Tools for each objective", items:["Clarity: intake survey, 'Getting Started' steps, stage-specific next steps","Connection: member directory, guided introduction post, welcome team","Progress: 5-day challenge, first assignment, community post prompt"]}
          ],
          mindset:"Clarity reduces anxiety. Connection builds trust. Progress sparks commitment. Get these three things right in your onboarding, and everything else gets easier."
        },
        tasks:[
          {id:"clarity_plan", label:"How I'll help new members find their starting point:", type:"textarea", ph:"Intake survey? 'Start Here' page? Pointing them to their Success Path™ stage?"},
          {id:"connection_plan", label:"How I'll help new members make their first connection:", type:"textarea", ph:"Welcome post questions? Member directory? Welcome team? Introduction prompt?"},
          {id:"progress_plan", label:"The first win I'll help new members get within their first week:", type:"textarea", ph:"Complete a checklist? Download a template? Post in the community? Finish one lesson?"},
          {id:"welcome_post", label:"My welcome post (use the AI prompt below, then rewrite it in your voice):", type:"textarea", ph:"Paste and edit your welcome message here — make sure it sounds like YOU, not a template..."}
        ],
        prompts:[
          {label:"Write Your Member Welcome Post", hint:"Use this to draft a warm, engaging welcome post for your community.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'd like to write a warm and welcoming kickoff post for my membership community. I'd like the tone to be [warm / encouraging / playful — customize this].\n\nMy membership is called [YOUR MEMBERSHIP NAME]. It's designed to help [MARKET] achieve [describe the transformation].\n\nThis post should:\n• Welcome members into the community\n• Give them 3 simple action steps to get engaged\n• Include 2–3 intro questions they can answer in the comments to build connection\n• Include a bonus action (like posting a photo or sharing a win)\n\nPlease keep it warm and real — not corporate or stiff."},
          {label:"Write Your Welcome Video Script", hint:"Use this to create a script for your member welcome video.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'd like to create a warm and engaging welcome video script for new members of my membership called [YOUR MEMBERSHIP NAME].\n\nMy membership helps [MARKET] go from [the 'without' state] to [the 'with' state].\n\nThe script should:\n• Welcome them warmly and make them feel they made the right decision\n• Give a brief overview of what they'll achieve\n• Tell them exactly what to do first (e.g. complete their profile, watch the Getting Started video)\n• Encourage patience and celebrate small progress\n• Be under 2 minutes when read aloud\n\nTone: [warm / conversational / encouraging — customize this]"},
          {label:"Create a 5-Day Quick Win Challenge", hint:"Give new members momentum in their first week with a simple challenge.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'd like to create a 5-day quick win challenge for my new members to help them build momentum during their first week.\n\nMy membership is called [YOUR MEMBERSHIP NAME] and helps [MARKET] achieve [transformation].\n\nPlease create a 5-day challenge using this structure:\n• Day 1: Reflect\n• Day 2: Reset\n• Day 3: Refresh\n• Day 4: Reserve\n• Day 5: Recommit\n\nFor each day include:\n• A renamed focus that fits my audience\n• 2 action steps\n• A community post prompt (e.g. 'Start your post with...')\n• A hashtag suggestion\n\nTone: [encouraging / nurturing / energetic — customize this]"}
        ],
        suggestions:["What should my intake survey ask new members?","How long should my onboarding sequence be?","Can you review my welcome post and make it sound more like me?"]
      },
      {
        id:"ddl2", tag:"Deep Dive 2", title:"Creating Your Core Content", required:false,
        learn:{
          sections:[
            {h:"What Core Content Does", items:["Gets everyone aligned on the same transformation","Helps members understand the full journey ahead","Tells them where they are right now and what to focus on","Prevents overwhelm from random content browsing"]},
            {h:"The Core Content Formula (5-stage example)", items:["Lesson 1: Introduction — overview of your Success Path™ and how to use it","Lessons 2–6: One video per stage — what they're thinking/feeling, their challenge, their next focus","Lesson 7: Summary/wrap-up — recap, motivation, clear next step","Each video: under 2 minutes, warm and specific to that stage"]}
          ],
          mindset:"Your core content isn't about teaching everything — it's about helping people know where they are, what matters now, and where they're headed. Clarity wins. Direction wins. Progress wins."
        },
        tasks:[
          {id:"intro_script", label:"My core content intro video script (draft):", type:"textarea", ph:"Overview of your Success Path™. How to use these videos. Where to start. Keep it under 2 minutes."},
          {id:"stage_scripts", label:"My stage video scripts (one per stage — paste your AI output then edit):", type:"textarea", ph:"Stage 1 script:\n[Welcome → acknowledge where they're at → what to focus on → mistake to avoid → call to action]\n\nStage 2 script:..."},
          {id:"summary_script", label:"My summary/wrap-up video script:", type:"textarea", ph:"Recap the Success Path™, briefly revisit each stage, tell them what to do next, leave them motivated and excited."}
        ],
        prompts:[
          {label:"Write All Your Core Content Video Scripts", hint:"This generates scripts for your intro, every stage, and your wrap-up in one prompt.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nMy membership helps people go from [starting point] to [final transformation] through a Success Path™ called [SUCCESS PATH NAME] with [NUMBER] stages.\n\nPlease write scripts for:\n\n1. INTRODUCTION VIDEO — Overview of the Success Path™, how members can use the stage videos to find where they are, and what knowing that will guide them to do next.\n\n2. STAGE VIDEOS — One script per stage. Each script should:\n• Welcome members to the stage\n• Acknowledge where they're at and how they may be feeling\n• Explain what to focus on at this stage\n• Share 1–2 mistakes to avoid\n• End with an encouraging call to action\n\nMy stages are:\n[PASTE YOUR STAGE NAMES AND DESCRIPTIONS HERE]\n\n3. SUMMARY VIDEO — Recap the full path, briefly revisit each stage, tell them what to do next, and leave them excited about the journey ahead.\n\nTone: [warm / conversational / encouraging — customize]. Keep each script under 2 minutes."}
        ],
        suggestions:["How long should each core content video be?","Can you help me make my stage descriptions sound more relatable and less clinical?","What's the best way to record these videos — camera on or slides?"]
      },
      {
        id:"ddl3", tag:"Deep Dive 3", title:"Creating Your Monthly Content", required:false,
        learn:{
          sections:[
            {h:"Monthly vs Core Content", items:["Core content = the map (where they are, where they're going)","Monthly content = the fuel (what moves them forward each month)","Monthly content should support your Success Path™ stages"]},
            {h:"Two Ways to Structure Monthly Content", items:["Option 1: Different content for different stages — great when most members cluster at one stage","Option 2: One deliverable for everyone + stage-specific prompts at the end — simpler to produce"]},
            {h:"The Golden Rule", items:["One primary deliverable per week","Max 60–90 minutes of learning per week — members need time to implement","Start with 1–2 deliverables and only add more when members need it"]}
          ],
          mindset:"Don't try to impress your members with more. Help them make progress with less — and they'll stick around longer."
        },
        tasks:[
          {id:"del1", label:"Monthly Deliverable 1 — Title, description, and format:", type:"textarea", ph:"Title: e.g. Monthly Masterclass\nDescription: A 45-min training on one focused topic aligned with the Success Path™\nFormat: Pre-recorded video + PDF summary\nAlternate formats: Audio, transcript"},
          {id:"del2", label:"Monthly Deliverable 2 — Title, description, and format:", type:"textarea", ph:"Title: e.g. Live Q&A Call\nDescription: 60-min open Zoom session for member questions\nFormat: Live video\nAlternate formats: Replay recording, audio"},
          {id:"del3", label:"Monthly Deliverable 3 (optional) — Title, description, and format:", type:"textarea", ph:"Title:\nDescription:\nFormat:\nAlternate formats:"},
          {id:"structure_choice", label:"How I'll structure my monthly content:", type:"radio", opts:["Different content for different Success Path™ stages","One deliverable for everyone + stage-specific prompts","Still figuring this out"]}
        ],
        prompts:[],
        suggestions:["What monthly deliverables work best for my membership model?","How do I decide which stage to focus my monthly content on?","How do I repackage content so members can consume it in different formats?"]
      },
      {
        id:"ddl4", tag:"Deep Dive 4", title:"Mapping Out Your 12-Month Content Calendar", required:false,
        learn:{
          sections:[
            {h:"The Batch-Friendly Content Model", items:["One main deliverable per week = four drops per month = just 12 ideas per deliverable for the whole year","Batch-produce 3+ months of content in one sitting to stay ahead","3 of 4 deliverables can be pre-recorded — only 1 needs to be live"]},
            {h:"Create Templates for Each Deliverable", items:["Opening hook or theme","Main lesson or takeaway","Action step or prompt","Optional: reflection, tool, or resource","Consistent structure = faster production every month"]}
          ],
          mindset:"Planning a year of content doesn't take a year — it takes a focused few hours. When you simplify the system, you give yourself back the most precious resource: time."
        },
        tasks:[
          {id:"calendar", label:"My 12-month content calendar (use the AI prompt below, then customise):", type:"textarea", ph:"Jan: Topic/focus — Deliverable 1: — Deliverable 2:\nFeb: Topic/focus — Deliverable 1: — Deliverable 2:\nMar: ...\n(Continue for all 12 months)"},
          {id:"templates", label:"My content templates for each deliverable (paste and edit from AI):", type:"textarea", ph:"Masterclass template:\n1. Opening hook\n2. Why this matters\n3. Core teaching\n4. Mistakes to avoid\n5. Action step\n6. Encouraging close\n\nQ&A template: ..."},
          {id:"batch_plan", label:"My batching plan — when I'll create content in advance:", type:"textarea", ph:"e.g. I'll batch 3 months of masterclasses every quarter in the first week of the month. I'll record all January–March content in December."}
        ],
        prompts:[
          {label:"Generate Your 12-Month Content Calendar", hint:"Use this to map out a full year of content aligned with your Success Path™.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI am creating a 12-month content calendar for my membership called [YOUR MEMBERSHIP NAME].\n\nMy monthly deliverables are:\n[LIST YOUR 1–4 DELIVERABLES HERE WITH SHORT DESCRIPTIONS]\n\nBased on my Success Path™ called [SUCCESS PATH NAME], please map out 12 months of monthly content and suggest a topic or focus for each month.\n\nMy Success Path™ stages are:\n[PASTE YOUR STAGE NAMES AND DESCRIPTIONS HERE]\n\nThe goal is to align each month's content with where members are in their journey, progressing naturally through the stages.\n\nDo you understand?"},
          {label:"Create Reusable Templates for Each Deliverable", hint:"Get a repeatable outline for each monthly deliverable so you can batch content faster.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI want to create a repeatable template for each of my monthly deliverables for my membership called [YOUR MEMBERSHIP NAME].\n\nMy deliverables are:\n[LIST YOUR DELIVERABLES HERE]\n\nPlease write a simple, reusable structure or outline for each deliverable that I can follow every month to batch my content efficiently.\n\nKeep it aligned with my audience ([MARKET]), tone ([warm / encouraging / etc.]), and the goal of helping them move through my Success Path™ called [SUCCESS PATH NAME]."}
        ],
        suggestions:["Can you help me come up with 12 masterclass topics for my membership?","How far in advance should I batch my content?","What's the best way to stay consistent with content production each month?"]
      }
    ]
  },
  {

            {h:"How to Use Your Values in Marketing", items:["Your beliefs and values should show up in your content, marketing, and member experience","Take a clear stance on what you DO and DON'T believe — share it openly","Use 'anti-values' to reveal what you stand for — what you reject says as much as what you embrace"]}

          {id:"about_paragraph", label:"My 'What I stand for' paragraph (for my website or About page):", type:"textarea", ph:"Use the AI prompt below to draft it, then rewrite it in your own voice..."}

        suggestions:["Help me figure out what I truly stand for in my niche","What anti-values would resonate with my specific audience?","Can you review my belief statements and make them sound bolder and more like me?"]

      {
        id:"cl2", tag:"Core Lesson 2", title:"Membership Marketing Models", required:true,
        learn:{
          sections:[
            {h:"Open Marketing Model", items:["Membership is always available — anyone can join at any time","Works best when your audience needs immediate access (e.g. pregnant moms, urgent problems)","Risk: no urgency = people procrastinate and forget","Fix: implement monthly urgency tactics like limited-time bonuses or deadline offers"]},
            {h:"Closed Marketing Model", items:["Membership only opens a few times per year","Creates built-in urgency and scarcity — people can't just join whenever","Stu's experience: switching from open to closed grew enrollments from 125/month to 600–800 per promotion","2 promotions/year → 1,500–3,000 new members each time — with half the work"]}
          ],
          mindset:"Closed models create a focused marketing push that leads to massive growth in a short amount of time. It's all about anticipation and excitement."
        },
        tasks:[

          {id:"open_promos", label:"If Open model — my 12 monthly urgency tactics or incentives (use the AI prompt below):", type:"textarea", ph:"Jan: [bonus or incentive + message angle]\nFeb: [bonus or incentive + message angle]\n... (continue for all 12 months)"},
          {id:"closed_timing", label:"If Closed model — when I'll open enrollment (months + how many times per year):", type:"textarea", ph:"e.g. April and September — 2 times per year\nOr: January, May, and September — 3 times per year"}

        ],
        suggestions:["Which marketing model makes more sense for where I am right now?","How do I create urgency in an open model without feeling pushy?","How many times a year should I open a closed membership?"]

      {
        id:"cl4", tag:"Core Lesson 4", title:"Craft a Winning Offer", required:true,
        learn:{
          sections:[
            {h:"The 5 Core Components of an Irresistible Offer", items:["🎯 Positioning — establish yourself as the authority for solving their specific problem","🪝 Hook — highlight the before/after contrast; speak to their deepest desires and outcomes","📦 Deliverables — list what's included AND explain why each piece matters","🎁 Bonuses — address common objections or help them implement faster (fast-action bonuses work especially well)","✅ Extras — guarantee, deadline, social proof, and pricing contrast to make it a no-brainer"]},
            {h:"Pricing Strategy", items:["Use contrast — compare your price against the value or against alternatives","Be transparent and proud of your price — don't hide it","A guarantee removes risk and makes it easier to say yes","Deadlines create urgency and push people to act now instead of 'maybe later'"]}
          ],
          mindset:"Your offer isn't just about what they get — it's about the transformation you're promising. Lead with outcomes and your audience will see the true value."
        },
        tasks:[
          {id:"positioning", label:"My positioning statement:", type:"textarea", ph:"I help [audience] go from [current state] to [desired outcome] through [your unique approach]..."},
          {id:"hook", label:"My hook (the before/after contrast that grabs attention):", type:"textarea", ph:"What if [desired future state]? Right now you're [current pain point] — but inside [membership name], you'll [transformation]..."},
          {id:"deliverables", label:"My deliverables (each with a 'why it matters' sentence):", type:"textarea", ph:"1. [Deliverable name] — so that [why it matters / what problem it solves]\n2. [Deliverable name] — so that...\n3. ..."},
          {id:"bonuses", label:"My bonuses (and the objection or pain point each addresses):", type:"textarea", ph:"Bonus 1: [Name] — helps members who [common objection or struggle]\nBonus 2: [Name] — helps members who [common objection or struggle]"},
          {id:"extras", label:"My offer extras (guarantee, deadline, social proof, pricing):", type:"textarea", ph:"Guarantee: e.g. 14-day money-back\nDeadline: e.g. founding member price until [date]\nSocial proof: e.g. testimonials from [who]\nPricing: $[X]/month or $[Y]/year"},
          {id:"cta", label:"My call to action:", type:"textarea", ph:"Click [button] to [action] and [start experiencing the transformation]..."}
        ],
        prompts:[
          {label:"Build Out Your Full Winning Offer", hint:"This prompt generates all 7 components of your offer in one go — ready to use on your sales page and in your launch.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'm creating a compelling offer for my membership. Please help me build out each of the core components:\n\nMy membership helps them go from [current reality — from your Messaging Map] to [desired transformation].\n\n• Positioning: A statement showing what I'm known for and what transformation I deliver\n• Hook: A message capturing the before/after journey that grabs attention\n• Deliverables: A clear list of what's included with context on why each matters. My deliverables are: [LIST YOUR DELIVERABLES]\n• Bonuses: 1–2 bonuses that address common objections. My bonuses are: [LIST IF KNOWN]\n• Extras: Guarantee, deadline, social proof elements. My extras: [LIST IF KNOWN]\n• Pricing: Value-contrast explanation that makes the price feel like a no-brainer. My prices: [e.g. $X/month or $Y/year]\n• Call to Action: Simple and direct — what to do next\n\nFocus on outcome-based, transformation-first language throughout."}
        ],
        suggestions:["Can you review my positioning statement and make it sharper?","What bonuses would work best for my specific audience's objections?","How do I write my hook so it immediately resonates with my ideal member?"]
      },
      {
        id:"ddl1", tag:"Deep Dive 1", title:"Common Pricing Models", required:false,
        learn:{
          sections:[
            {h:"7 Pricing Models", items:["💳 Monthly Subscription — most common; start low and raise over time","📅 Monthly + Annual Option — incentivize annual commitment with a discount (better cash flow)","💰 Upfront Fee + Monthly — discourages cancellation/rejoining, gives cash injection upfront","⛔ One-Time Fee — NOT recommended; unsustainable and not a true membership model","📆 Fixed-Term Fee — set number of months (6, 9, or 12) with a clear end date","🧪 Trial + Monthly — $1 for 3 days then regular price; great post-promotion strategy","♾️ Evergreen — automated funnel, best for 2,000+ members, requires ads investment"]},
            {h:"How to Set Your Starting Price", items:["Start lower than you think — every price increase is a built-in promotion","B2B or 'make/save money' memberships: $50–$100/month (front-end), $200–$1,000/month (back-end)","Hobby or pet markets: $5–$25/month (front-end), up to $100–$200/month (back-end)","Health markets: $10–$50/month typically","Your Success Path™ is critical — the more progress members make, the more you can charge"]}
          ],
          mindset:"Pricing doesn't have to be set in stone. Start with a model that feels right, and adjust as your membership grows and delivers more value."
        },
        tasks:[
          {id:"pricing_model", label:"My pricing model:", type:"radio", opts:["Monthly subscription only","Monthly + Annual option","Upfront fee + Monthly","Fixed-term","Trial + Monthly","Not decided yet"]},
          {id:"price_point", label:"My founding member price point (use the AI prompt below to explore options):", type:"textarea", ph:"Monthly: $___/month\nAnnual: $___/year\nFounding member special: $___ (locked in for life)"},
          {id:"price_rationale", label:"Why this price makes sense for my audience and market:", type:"textarea", ph:"What are competitors charging? Where does my price sit relative to them? What does this price signal to potential members?"}
        ],
        prompts:[
          {label:"Get Founding Member Pricing Recommendations", hint:"Use this to explore 2–3 price points for your Founding Member Launch with strategic reasoning.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'm preparing for my Founding Member Launch and need help choosing a starting price.\n\nBackground:\n• My audience is: [MARKET]\n• The transformation I help them achieve: [current state → desired outcome]\n• Key deliverables included: [LIST YOUR DELIVERABLES]\n• My Success Path™ stages: [LIST STAGE NAMES]\n• Pricing structure I want to offer: [monthly only / monthly + annual / other]\n• Competitor memberships in my market (if known): [LIST 1–3 EXAMPLES WITH PRICES]\n• Other memberships or creators my audience follows: [LIST IF KNOWN]\n\nPlease suggest 2–3 potential Founding Member price points and for each:\n• Explain why it makes sense for my audience\n• What message that price sends (accessible / premium / serious investment)\n• How I might position it in my launch messaging\n\nNote: I know I can raise the price later — start strategic but affordable."}
        ],
        suggestions:["What pricing model works best for a brand new membership?","How do I justify a higher price point to my audience?","Should I offer an annual option from the start or wait until I've proven the membership?"]
      },
      {
        id:"ddl2", tag:"Deep Dive 2", title:"Creating Contrast with Your Pricing", required:false,
        learn:{
          sections:[
            {h:"Why Contrast Is Everything in Pricing", items:["Pricing is always relative — people compare your price to something else","Your job: control the comparison so your price always looks good","The blueberry analogy: $2 off a $4 pint feels amazing. $2 off a $30,000 car feels insulting.","The lesson: the same number means something completely different depending on the context"]},
            {h:"3 Ways to Use Contrast", items:["Position as the low-price option: compare to a higher-priced membership with similar deliverables","Position as the premium option: compare to a cheaper membership with less value","Use the decoy strategy: offer 3 tiers where the middle option looks like a great deal (The Economist example: print $125, online $59, print + online $125 — everyone chose the third)"]}
          ],
          mindset:"If someone says your membership is 'too expensive,' don't get discouraged — use contrast to your advantage. Frame your price against the value, and your audience will see it as an investment."
        },
        tasks:[
          {id:"contrast_strategy", label:"How I'll use pricing contrast in my marketing:", type:"textarea", ph:"Will you compare to a more expensive option to show you're affordable? Or compare to a cheaper option with less value to show you're premium? Or use a decoy tier strategy?"}
        ],
        prompts:[],
        suggestions:["How do I use contrast when I don't know what competitors charge?","Should I list my price early or late on my sales page?","How do I use the decoy pricing strategy for a membership?"]
      },
      {
        id:"ddl3", tag:"Deep Dive 3", title:"Mapping Your Marketing Calendar", required:false,
        learn:{
          sections:[
            {h:"A-Level Promotions (Big Push)", items:["High energy, high effort — require weeks of preparation","Bring in significant influx of new members","Plan for 2 per year, spaced evenly (e.g. April and September)","Allow 1–2 months before each to build anticipation","Give yourself recovery time after — focus on onboarding before the next push"]},
            {h:"B-Level Promotions (Simpler Campaigns)", items:["Smaller, easier-to-execute — typically an email flash sale to your waitlist","3–4 per year, in the months between A-level promotions (e.g. January, July, November)","Can be reused with little modification year after year","Target people who showed interest but didn't sign up during your big promotions"]}
          ],
          mindset:"You don't need to promote all year long — strategic, well-timed A-level and B-level promotions create a steady rhythm that fuels growth without burnout."
        },
        tasks:[
          {id:"a_level_months", label:"My A-level promotion months:", type:"textarea", ph:"e.g. April and September\nOr: January, May, and October\n\nWhat makes these months strategic for your audience?"},
          {id:"b_level_months", label:"My B-level promotion months:", type:"textarea", ph:"e.g. January, July, November\nWhat type of promo will each be? (flash sale, affiliate push, waitlist email, etc.)"},
          {id:"full_calendar", label:"My full 12-month marketing calendar:", type:"textarea", ph:"Jan: B-level — [type + brief description]\nFeb: content/community building\nMar: pre-launch build for April\nApr: A-level launch — [brief description]\n... (continue all 12 months)"}
        ],
        prompts:[
          {label:"Review and Optimise Your Marketing Calendar", hint:"Use this to get strategic feedback on your planned promotion schedule.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI've mapped out my marketing calendar for the year:\n\nA-level promotions (big launches): [LIST YOUR MONTHS]\nB-level promotions (flash sales, waitlist pushes): [LIST YOUR MONTHS]\nContent/community months: [LIST YOUR MONTHS]\n\nCan you:\n1. Review my calendar and identify any gaps, conflicts, or timing issues\n2. Suggest any adjustments to optimise my marketing flow\n3. Recommend what I should be doing in the non-promo months to build momentum for my next launch\n4. Flag any months that might be difficult for my specific audience (holidays, seasonal patterns, etc.)"}
        ],
        suggestions:["When is the best time of year to run a big launch for my audience?","How do I build anticipation before an A-level promotion?","What should I be doing between promotions to keep warm leads engaged?"]
      },
      {
        id:"ddl4", tag:"Deep Dive 4", title:"Sales Page Fundamentals", required:false,
        learn:{
          sections:[
            {h:"7 Questions Every Sales Page Must Answer", items:["1. What is it that you're offering? — clear, upfront, no confusion","2. Why does it matter? — the before/after contrast; why should they care right now?","3. Who are you and why did you develop this? — your credibility and story","4. What is possible with your process? — show the transformation your system delivers","5. What is included? — deliverables with context on why each matters","6. What is the price? — be transparent and proud; use contrast","7. What do you want people to do next? — one clear call to action"]},
            {h:"Sales Page Design Principles", items:["Most visitors skim — use headlines and sub-headlines as your 7 answers","A winning sales page sells transformation, not just features","Your story is your credibility — you don't need formal credentials","Social proof (testimonials, wins) does the heavy lifting for you"]}
          ],
          mindset:"A winning sales page doesn't just tell people what they'll get — it sells the transformation. Show them how their life will change after joining."
        },
        tasks:[
          {id:"sp_offering", label:"1. What I'm offering (clear, one-sentence statement):", type:"textarea", ph:"e.g. 'A monthly membership for [audience] that helps them [specific result] without [common pain]'"},
          {id:"sp_why", label:"2. Why it matters (the before/after contrast):", type:"textarea", ph:"Right now, your audience is [current pain]. Inside [membership], they'll [desired future state]..."},
          {id:"sp_credibility", label:"3. Who you are and why you developed this:", type:"textarea", ph:"Your story, your experience, what makes you qualified — credentials OR lived experience both work"},
          {id:"sp_process", label:"4. What's possible with your process (transformation proof):", type:"textarea", ph:"Describe your Success Path™ or methodology and the results it delivers..."},
          {id:"sp_included", label:"5. What's included (deliverables with 'why it matters'):", type:"textarea", ph:"• [Deliverable] — so that [why it matters]\n• [Deliverable] — so that..."},
          {id:"sp_price", label:"6. Your price (with contrast framing):", type:"textarea", ph:"'For less than [relatable comparison], you get [transformation]...' — then clearly state your price"},
          {id:"sp_cta", label:"7. Your call to action:", type:"textarea", ph:"Click [button] to [action] and [start the transformation today]..."}
        ],
        prompts:[
          {label:"Draft Your Full Sales Page", hint:"This generates all 7 sections of your sales page in one go — ready to edit and publish.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'm writing a sales page for my membership. Please draft compelling, clear copy that answers all 7 key questions:\n\n1. What I'm offering: [membership name + who it's for]\n2. The transformation: from [current state] to [desired outcome]\n3. My credibility: [your story / experience / why you created this]\n4. My process: [your Success Path™ or methodology]\n5. Deliverables: [LIST WITH SHORT DESCRIPTIONS]\n6. Pricing: [your price points]\n7. Call to action: [what you want them to do]\n\nPlease write a full sales page with headlines and sub-headlines for each section. Keep the tone [warm / conversational / bold — customize] and focus every section on transformation, not just features."},
          {label:"Write Your Credibility Story (Without Formal Credentials)", hint:"Don't have a degree or certification? Use this to craft a credibility section based on lived experience.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'm writing the credibility section of my sales page but I don't have formal training or credentials.\n\nPlease help me write a credibility statement based on:\n• My personal journey related to this topic: [YOUR ANSWER]\n• Challenges I've overcome that my audience faces: [YOUR ANSWER]\n• How I've helped others (formally or informally): [YOUR ANSWER]\n• What people come to me for: [YOUR ANSWER]\n• Why I'm passionate about this: [YOUR ANSWER]\n• What makes me relatable to my audience: [YOUR ANSWER]\n\nWrite a warm, honest, and confident credibility section for my sales page that makes me sound human and trustworthy — not clinical or stiff."}
        ],
        suggestions:["Can you review my sales page draft and tell me what's missing?","How long should my sales page be for a lower-priced membership?","How do I write the 'why it matters' section without sounding pushy?"]
      }
    ]
  },
  {

          sections:[
            {h:"The Launch Style Spectrum", items:["Simple end: flash email launch, social post + DMs, 1:1 personal invites","Middle: Founding Member Launch, Facebook Lives, coaching week","Complex end: full video series + webinar + ads + affiliates + challenge/bootcamp","There is no right or wrong — just the best match for YOU"]},
            {h:"Why Your Style Matters", items:["When you launch in a style that feels natural you show up with more confidence","You avoid burnout and actually enjoy the process","You convert better because your energy is authentic","You can always grow into more complexity over time — Stu started with just pre-recorded videos + a webinar"]}

          {id:"style_why", label:"Why this style feels like the right fit for me right now:", type:"textarea", ph:"Think about your strengths, your bandwidth, your audience's preferences, and your comfort level..."},

      {
        id:"cl2", tag:"Core Lesson 2", title:"Launch Content Fundamentals", required:true,
        learn:{
          sections:[
            {h:"The 3 Launch Content Fundamentals", items:["1. Present the Opportunity — paint the vision of transformation before you talk about your offer. Show it's possible AND possible for them. Use real-world proof (trends, case studies, news).","2. Guide Them Through the First Step — help them experience a small win BEFORE they buy. Progress builds belief. Create results in advance of the sale.","3. Share the Blueprint — reveal your Success Path™. Show where they are, where they're going, and how your membership is the bridge."]},
            {h:"Why This Works (The Psychology)", items:["Hope: 'Could this really work for me?'","Progress: 'Okay, I'm doing it and I see it working'","Clarity: 'Now I see the full picture — I'm in'"]}
          ],
          mindset:"Confidence creates conversions. Don't just explain — guide, inspire, and empower. Show people transformation is possible, then walk them into it."
        },
        tasks:[
          {id:"opportunity", label:"The transformation / opportunity I'll present at the start of my launch:", type:"textarea", ph:"What's the bigger picture you're inviting your audience into? What proof or trends back it up?"},
          {id:"first_step", label:"The 'first step' win I'll help my audience experience during my free training:", type:"textarea", ph:"What small, meaningful action can they take that creates a result BEFORE they buy? (e.g. complete a worksheet, make a decision, post something, create a mini version of something)"},
          {id:"blueprint", label:"How I'll present my Success Path™ as the launch blueprint:", type:"textarea", ph:"How will you walk them through the full journey? How does each stage connect to where they are right now?"}
        ],
        prompts:[
          {label:"Brainstorm Your 'First Step' Win", hint:"Use this to design the small, meaningful result your audience will experience during your free training.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nI'm designing a free training experience and I want to help my audience get a small but meaningful win before they buy.\n\nMy audience: [MARKET]\nThe transformation I help them achieve: [from your Messaging Map — before → after]\nMy membership deliverables include: [LIST YOUR KEY DELIVERABLES]\nMy Success Path™ stages: [LIST YOUR STAGE NAMES]\n\nPlease suggest 2–3 ideas for a 'first step' my audience can complete during my free training. Each idea should:\n• Be quick and easy to complete\n• Create a real (even if small) result\n• Build belief in the bigger transformation\n• Feel encouraging, not overwhelming"},
          {label:"Turn Your Success Path™ Into a Launch Blueprint", hint:"Use this to transform your Success Path™ into a compelling journey you can share during your launch.", template:"My target market is [MARKET]. My area of focus is [FOCUS]. I am a [IDENTITY].\n\nDo you understand?\n\nMy Success Path™ has [NUMBER] stages. Please help me turn it into a launch-ready blueprint I can share during my free training.\n\nHere are my stages:\n[PASTE YOUR STAGE NAMES AND DESCRIPTIONS FROM MODULE 2]\n\nFor each stage, please include:\n• A simplified, audience-friendly explanation of the stage\n• The core milestone or focus\n• How my membership specifically supports members at this stage\n\nTone: clear, encouraging, and focused on progress. This should help my audience see the full journey and feel excited about having support."}
        ],
        suggestions:["What kind of first step win would work best for my specific audience?","How do I make my Success Path™ feel exciting and not overwhelming when I share it?","How do I present the 'opportunity' without it feeling salesy?"]
      },
      {
        id:"cl3", tag:"Core Lesson 3", title:"5 Phases of a Successful Launch", required:true,
        learn:{
          sections:[
            {h:"The 5 Launch Phases", items:["1. 🤝 Connection (2–3 months out) — build emotional trust. Share your values, what you stand for, your story. No selling.","2. 📣 Awareness (1–2 months out) — build belief in the possibility. Share member wins, before/afters, success stories. Gush over your people.","3. 🔥 Desire (7–10 days out) — deliver your 3-part training: Opportunity → First Step → Blueprint. This is where people lean in and say 'I want this.'","4. 💳 Purchase (4–7 days) — cart is open. Sales page live. Remind, reinforce, answer objections, go live, use testimonials.","5. 🎉 Wow (immediately after joining) — deliver an incredible onboarding experience. The Wow phase is your pre-launch for the next launch."]},
            {h:"Two Timeline Options", items:["Regular launch: 2–3 months connection → 1–2 months awareness → 7–10 days desire → 4–7 days purchase → wow ongoing","Compressed launch: 1–2 weeks connection + awareness combined → 5–7 days desire → 3–5 days purchase → wow ongoing"]}
          ],
          mindset:"A successful launch isn't just about what happens during your cart open — it's about what happens before and after, too. The longer the runway, the bigger the results."
        },
        tasks:[
          {id:"timeline", label:"My launch timeline:", type:"radio", opts:["Regular — full runway (2–3 months)","Compressed — quick launch (3–4 weeks total)","Not sure yet"]},
          {id:"phase_dates", label:"My target dates for each launch phase:", type:"textarea", ph:"Connection phase starts: \nAwareness phase starts: \nDesire phase starts: \nCart open: \nCart close: \nWow / onboarding begins: "}
        ],
        prompts:[],
        suggestions:["How do I build connection with a small audience before a launch?","What should I post during the awareness phase?","How do I create urgency during the purchase phase without feeling pushy?"]
      },
      {
        id:"cl4", tag:"Core Lesson 4", title:"Launch Components", required:true,
        learn:{
          sections:[
            {h:"What to DO in each phase", items:["🤝 Connection: share values, 'why I do this' stories, what you're against, behind-the-scenes. No CTA needed — just connect.","📣 Awareness: success stories, before/afters, objection-crushing panels. Not about you — about people like your audience.","🔥 Desire: deliver 3-part training (pre-recorded, live, email, audio — your choice), optional webinar/Q&A to close","💳 Purchase: sales page + payment portal live, enrollment emails, go live to answer Q's, testimonials, direct invites, affiliates if relevant","🎉 Wow: opening celebration, new member onboarding call, community connection events, first quick win experience"]}
          ],
          mindset:"When you show up with purpose and clarity across all five phases, you build trust, belief, desire, and long-term commitment."
        },
        tasks:[

          {id:"launch_style_confirm", label:"My final launch style decision:", type:"textarea", ph:"Based on everything you've learned — what does your launch actually look like? Be specific about format, platform, timeline, and your personal role."}
        ],
        prompts:[

        ],
        suggestions:["What should I do during the connection phase if I have a small audience?","How many emails should I send during the purchase phase?","What does a great Wow phase look like for a brand new membership?"]
      },
      {
        id:"ddl1", tag:"Deep Dive 1", title:"Debriefing Your Launch for Maximum Momentum", required:false,
        learn:{
          sections:[
            {h:"Why Debriefing Matters", items:["Every launch gives you two things: results AND insights","Skipping the debrief is one of the most common mistakes membership owners make","'I never lose — I either win or I learn.' — Nelson Mandela","Tweak 10%, keep 90% — you don't need to start over each time"]},
            {h:"6 Conversion Points to Review", items:["1. Traffic to your sign-up page — did people see the offer?","2. Sign-up/opt-in rate — was your sign-up page compelling?","3. Show-up rate — did your reminder strategy work?","4. Watch time / drop-off — was your training engaging?","5. Conversion rate at offer — was your offer clear and compelling?","6. Follow-up conversion rate — did your post-launch emails drive action?"]},
            {h:"Post-Launch Checklist", items:["Pause or stop all ads","Update banners and redirect sales pages to waitlist","Onboard new members immediately","Nurture those who didn't buy with email + ongoing content","Run your debrief with your team","Capture screenshots and testimonials for next time"]}
          ],
          mindset:"Your first launch is never your final launch. Every time you launch, you get better, faster, and more confident. The debrief is how you go from good to great."

        tasks:[

          {id:"what_worked", label:"What worked well in this launch:", type:"textarea", ph:"What content got the best response? What felt easy and natural? What would you absolutely do again?"},
          {id:"what_didnt", label:"What didn't work or felt off:", type:"textarea", ph:"Where did you lose people? What felt draining? What tech or timing issues came up?"},
          {id:"next_tweaks", label:"The 1–2 things I'll tweak for next time:", type:"textarea", ph:"Remember: tweak 10%, keep 90%. What's the smallest change that could make the biggest difference?"},
          {id:"emotional_debrief", label:"How the launch felt (emotional debrief):", type:"textarea", ph:"What excited you? What drained you? What surprised you? What felt aligned — and what didn't?"}
        ],

  mobSidebar = !mobSidebar;
  const sb = document.getElementById("sidebar");
  const ov = document.getElementById("mob-overlay");
  if (sb) sb.classList.toggle("mob-o", mobSidebar);

  const sb = document.getElementById("sidebar");

function saveCtx()  { localStorage.setItem(SK_CTX,  JSON.stringify(ctx));     }

function saveDone() { localStorage.setItem(SK_DONE, JSON.stringify(done));    }
